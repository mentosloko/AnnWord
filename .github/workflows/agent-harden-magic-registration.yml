name: Harden magic registration

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/magic-link-recovery-stable-notices
          fetch-depth: 0
      - name: Detect one-time patch
        id: detect
        run: |
          if [ -f scripts/agent_harden_magic_registration.py ]; then
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply hardening
        if: steps.detect.outputs.apply == 'true'
        run: python3 scripts/agent_harden_magic_registration.py
      - name: Commit hardening
        if: steps.detect.outputs.apply == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm scripts/agent_harden_magic_registration.py
          git add .
          git commit -m "Harden magic-link-first registration"
          git push origin HEAD:agent/magic-link-recovery-stable-notices
