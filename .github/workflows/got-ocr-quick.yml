name: GOT OCR quick benchmark

on:
  push:
    branches:
      - test/easyocr-evaluation-20260718
    paths:
      - .github/workflows/got-ocr-quick.yml
      - scripts/got_ocr_quick.py
      - testdata/easyocr/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/got-ocr-quick.yml
      - scripts/got_ocr_quick.py
      - testdata/easyocr/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      HF_HUB_DISABLE_XET: '1'
      TOKENIZERS_PARALLELISM: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
          python -m pip install 'transformers>=5.13,<5.15' pillow safetensors sentencepiece accelerate
      - name: Run GOT benchmark
        shell: bash
        run: |
          mkdir -p got-ocr-result
          set +e
          python scripts/got_ocr_quick.py > got-ocr-result/run.log 2>&1
          status=$?
          cat got-ocr-result/run.log
          exit $status
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: got-ocr-result
          path: got-ocr-result/
          retention-days: 7
