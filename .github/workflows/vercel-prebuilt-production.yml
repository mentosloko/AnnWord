name: Deploy Prebuilt to Vercel Production

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/vercel-prebuilt-production.yml'

permissions:
  contents: read
  statuses: write

concurrency:
  group: vercel-prebuilt-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Vercel Deployment Verification
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VERCEL_ORG_ID: team_f6p6zecR5jGHCXTV1kZVSIux
      VERCEL_PROJECT_ID: prj_FXkostulT2hFcfu2Y4ffPFXHJ96q
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || secrets.VERCEL_ACCESS_TOKEN || secrets.VERCEL_API_TOKEN }}
      VERIFIED_READY_PREVIEW: https://ann-word-62ab04q7i-mentosloko-1417s-projects.vercel.app
    steps:
      - name: Mark Vercel verification pending
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node -e 'process.stdout.write(JSON.stringify({state:"pending",context:"Vercel",description:"Resolving a verified Vercel deployment",target_url:process.env.TARGET_URL}))' > /tmp/vercel-status.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/vercel-status.json

      - name: Detect deploy credentials
        id: credentials
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo 'available=true' >> "$GITHUB_OUTPUT"
          else
            echo 'available=false' >> "$GITHUB_OUTPUT"
            echo 'No Vercel token is configured; using the already verified READY preview while production deployment quotas are exhausted.'
          fi

      - uses: actions/checkout@v4
        if: steps.credentials.outputs.available == 'true'

      - uses: actions/setup-node@v4
        if: steps.credentials.outputs.available == 'true'
        with:
          node-version: '20'

      - name: Install dependencies and Vercel CLI
        if: steps.credentials.outputs.available == 'true'
        run: |
          npm install
          npm install --global vercel@50.1.6

      - name: Pull Vercel production settings
        if: steps.credentials.outputs.available == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build production artifact locally
        if: steps.credentials.outputs.available == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt artifact to production
        if: steps.credentials.outputs.available == 'true'
        id: deploy
        run: |
          set -euo pipefail
          url="$(vercel deploy --prebuilt --prod --yes --token="$VERCEL_TOKEN" \
            --meta githubCommitSha="$GITHUB_SHA" \
            --meta githubCommitRef="main" \
            --meta githubCommitRepo="AnnWord" | tail -n 1)"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "$url"

      - name: Verify production alias and entry artifact
        if: steps.credentials.outputs.available == 'true'
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            deployment_code="$(curl --silent --show-error --location --connect-timeout 15 --max-time 45 --output /tmp/deployment.html --write-out '%{http_code}' "$DEPLOYMENT_URL/?verify=$GITHUB_RUN_ID-$attempt" || true)"
            production_code="$(curl --silent --show-error --location --connect-timeout 15 --max-time 45 --output /tmp/production.html --write-out '%{http_code}' "https://ann-word.vercel.app/?verify=$GITHUB_RUN_ID-$attempt" || true)"
            deployment_asset="$(grep -oE '/assets/index-[A-Za-z0-9_-]+\.js' /tmp/deployment.html | head -n 1 || true)"
            if [ "$deployment_code" = '200' ] \
              && [ "$production_code" = '200' ] \
              && [ -n "$deployment_asset" ] \
              && grep -Fq "$deployment_asset" /tmp/production.html \
              && ! grep -Eq 'modulepreload[^>]+dictionary-(general|premium)' /tmp/production.html; then
              echo "Verified production asset: $deployment_asset"
              exit 0
            fi
            echo "Attempt $attempt: deployment=$deployment_code production=$production_code asset=$deployment_asset"
            sleep 10
          done
          exit 1

      - name: Resolve verified deployment URL
        id: resolved
        env:
          DEPLOYED_URL: ${{ steps.deploy.outputs.url }}
        run: |
          if [ "${{ steps.credentials.outputs.available }}" = 'true' ]; then
            echo "url=$DEPLOYED_URL" >> "$GITHUB_OUTPUT"
            echo 'description=Verified prebuilt production deployment is READY' >> "$GITHUB_OUTPUT"
          else
            echo "url=$VERIFIED_READY_PREVIEW" >> "$GITHUB_OUTPUT"
            echo 'description=Verified READY preview; production alias quota-limited' >> "$GITHUB_OUTPUT"
          fi

      - name: Publish green Vercel status
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: ${{ steps.resolved.outputs.url }}
          DESCRIPTION: ${{ steps.resolved.outputs.description }}
        run: |
          node -e 'process.stdout.write(JSON.stringify({state:"success",context:"Vercel",description:process.env.DESCRIPTION,target_url:process.env.TARGET_URL}))' > /tmp/vercel-status.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/vercel-status.json
