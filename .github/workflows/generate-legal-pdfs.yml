name: Generate legal PDFs

on:
  push:
    branches:
      - main
    paths:
      - 'legal-src/**'
      - 'scripts/generate_legal_pdfs.py'
      - '.github/workflows/generate-legal-pdfs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-legal-pdfs
  cancel-in-progress: true

jobs:
  generate:
    name: Generate AnnWord legal PDFs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PDF generator
        run: python -m pip install --disable-pip-version-check reportlab==4.4.3

      - name: Generate PDF documents
        run: python scripts/generate_legal_pdfs.py

      - name: Commit generated PDFs
        run: |
          set -euo pipefail
          git add public/legal/*.pdf
          if git diff --cached --quiet; then
            echo "Legal PDFs are already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Generate AnnWord legal PDFs"
          git push origin HEAD:main

# Regenerate documents when this workflow changes.
