name: Yandex Weekly Reports

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: yandex-weekly-reports
  cancel-in-progress: false

jobs:
  send:
    name: Send Yandex weekly reports
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check weekly report runtime
        env:
          YC_API_PUBLIC_URL: ${{ secrets.YC_API_PUBLIC_URL }}
        run: |
          set -euo pipefail
          API_BASE="${YC_API_PUBLIC_URL%/}"
          curl --fail-with-body --retry 3 --retry-all-errors -sS \
            "$API_BASE/api/reports/weekly/status" | tee /tmp/weekly-status.json
          node - <<'NODE'
          const fs = require('fs');
          const status = JSON.parse(fs.readFileSync('/tmp/weekly-status.json', 'utf8'));
          if (!status.configured) throw new Error('Weekly report runtime is not configured');
          if (status.postboxIdentityVerified === false) throw new Error(`Postbox sender domain ${status.senderDomain || 'unknown'} is not verified`);
          NODE

      - name: Run weekly reports
        env:
          YC_API_PUBLIC_URL: ${{ secrets.YC_API_PUBLIC_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -euo pipefail
          API_BASE="${YC_API_PUBLIC_URL%/}"
          CRON_TOKEN="$(node -e 'const {createHmac}=require("crypto"); process.stdout.write(createHmac("sha256", process.env.JWT_SECRET).update("annword-weekly-reports-v1").digest("hex"));')"
          HTTP_CODE="$(curl -sS --retry 3 --retry-all-errors \
            -o /tmp/weekly-result.json -w '%{http_code}' \
            -X POST "$API_BASE/api/reports/weekly/run" \
            -H "Authorization: Bearer $CRON_TOKEN" \
            -H 'Content-Type: application/json' \
            --data '{}')"
          cat /tmp/weekly-result.json
          test "$HTTP_CODE" = "200" -o "$HTTP_CODE" = "207"
          node - <<'NODE'
          const fs = require('fs');
          const result = JSON.parse(fs.readFileSync('/tmp/weekly-result.json', 'utf8'));
          if (Array.isArray(result.failed) && result.failed.length) {
            throw new Error(`${result.failed.length} weekly reports failed`);
          }
          console.log(`Weekly reports: processed=${result.processed || 0}, sent=${result.sent || 0}, skipped=${result.skipped || 0}`);
          NODE
