name: Weekly Parent Reports

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  statuses: write

concurrency:
  group: weekly-parent-reports
  cancel-in-progress: false

jobs:
  deliver:
    name: Send weekly reports
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: ${{ github.event_name != 'push' || contains(github.event.head_commit.message, '[postbox-smoke]') }}
    steps:
      - name: Mark delivery check pending
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node -e 'process.stdout.write(JSON.stringify({state:"pending",context:"Postbox Delivery",description:"Running protected weekly-report delivery",target_url:process.env.TARGET_URL}))' > /tmp/postbox-status.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/postbox-status.json

      - name: Invoke Yandex report runner
        id: invoke
        continue-on-error: true
        env:
          API_URL: ${{ secrets.YC_API_PUBLIC_URL }}
          REPORT_SECRET: ${{ secrets.WEEKLY_REPORT_CRON_SECRET }}
          REQUIRE_SENT: ${{ github.event_name == 'push' && '1' || '0' }}
        run: |
          set -euo pipefail
          if [ -z "${REPORT_SECRET:-}" ]; then
            echo "WEEKLY_REPORT_CRON_SECRET is not configured."
            exit 1
          fi
          API_BASE="${API_URL%/}"
          HTTP_CODE="$(curl --silent --show-error \
            --output /tmp/weekly-report-result.json \
            --write-out '%{http_code}' \
            -X POST "${API_BASE}/api/reports/weekly/run" \
            -H "Authorization: Bearer ${REPORT_SECRET}" \
            -H 'Content-Type: application/json' \
            --data '{}')"
          cat /tmp/weekly-report-result.json
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "207" ]; then
            echo "Weekly report runner returned HTTP ${HTTP_CODE}."
            exit 1
          fi
          if [ "$REQUIRE_SENT" = "1" ]; then
            node - <<'NODE'
          const fs = require('fs');
          const result = JSON.parse(fs.readFileSync('/tmp/weekly-report-result.json', 'utf8'));
          if (!Number.isFinite(Number(result.sent)) || Number(result.sent) < 1) {
            throw new Error(`Postbox smoke did not send a new message: processed=${result.processed ?? 'unknown'} sent=${result.sent ?? 'unknown'} skipped=${result.skipped ?? 'unknown'} failed=${Array.isArray(result.failed) ? result.failed.length : 'unknown'}`);
          }
          NODE
          fi

      - name: Upload delivery result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: annword-postbox-delivery
          path: /tmp/weekly-report-result.json
          if-no-files-found: ignore
          retention-days: 5

      - name: Publish delivery status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          INVOKE_OUTCOME: ${{ steps.invoke.outcome }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$INVOKE_OUTCOME" = "success" ]; then
            STATE="success"
            DESCRIPTION="Postbox accepted at least one weekly-report email"
          else
            STATE="failure"
            DESCRIPTION="Postbox delivery check failed; inspect workflow result"
          fi
          export STATE DESCRIPTION
          node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,context:"Postbox Delivery",description:process.env.DESCRIPTION,target_url:process.env.TARGET_URL}))' > /tmp/postbox-status.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/postbox-status.json

      - name: Assert delivery succeeded
        env:
          INVOKE_OUTCOME: ${{ steps.invoke.outcome }}
        run: test "$INVOKE_OUTCOME" = "success"
