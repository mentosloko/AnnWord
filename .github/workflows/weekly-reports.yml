name: Weekly Parent Reports

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: weekly-parent-reports
  cancel-in-progress: false

jobs:
  deliver:
    name: Send weekly reports
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Invoke Yandex report runner
        env:
          API_URL: ${{ secrets.YC_API_PUBLIC_URL }}
          REPORT_SECRET: ${{ secrets.WEEKLY_REPORT_CRON_SECRET }}
          JWT_ROOT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${REPORT_SECRET:-}" ] && [ -n "${JWT_ROOT_SECRET:-}" ]; then
            REPORT_SECRET="$(JWT_ROOT_SECRET="$JWT_ROOT_SECRET" node -e 'const {createHmac}=require("node:crypto"); process.stdout.write(createHmac("sha256", process.env.JWT_ROOT_SECRET).update("annword-weekly-reports-v1").digest("hex"))')"
          fi
          if [ -z "${REPORT_SECRET:-}" ]; then
            echo "Neither WEEKLY_REPORT_CRON_SECRET nor JWT_SECRET is configured."
            exit 1
          fi

          API_BASE="${API_URL%/}"
          if [ -z "$API_BASE" ]; then
            API_BASE="https://api.annword.ru"
          fi

          HTTP_CODE="$(curl --silent --show-error \
            --retry 3 \
            --retry-all-errors \
            --connect-timeout 15 \
            --max-time 90 \
            --output /tmp/weekly-report-result.json \
            --write-out '%{http_code}' \
            -X POST "${API_BASE}/api/reports/weekly/run" \
            -H "Authorization: Bearer ${REPORT_SECRET}" \
            -H 'Content-Type: application/json' \
            --data '{}')"

          cat /tmp/weekly-report-result.json
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "207" ]; then
            echo "Weekly report runner returned HTTP ${HTTP_CODE}."
            exit 1
          fi

          node - <<'NODE'
          const fs = require('fs');
          const result = JSON.parse(fs.readFileSync('/tmp/weekly-report-result.json', 'utf8'));
          if (Array.isArray(result.failed) && result.failed.length > 0) {
            throw new Error(`Weekly reports failed for ${result.failed.length} profile(s).`);
          }
          console.log(`Weekly reports completed: processed=${result.processed ?? 0}, sent=${result.sent ?? 0}, skipped=${result.skipped ?? 0}`);
          NODE

      - name: Upload delivery result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: annword-weekly-report-result
          path: /tmp/weekly-report-result.json
          if-no-files-found: ignore
          retention-days: 5
