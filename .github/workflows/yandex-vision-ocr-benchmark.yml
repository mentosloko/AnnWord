name: Yandex Vision OCR benchmark

on:
  push:
    branches:
      - test/easyocr-evaluation-20260718
    paths:
      - .github/workflows/yandex-vision-ocr-benchmark.yml
      - scripts/yandex_vision_ocr_benchmark.py
      - testdata/yandex-vision/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/yandex-vision-ocr-benchmark.yml
      - scripts/yandex_vision_ocr_benchmark.py
      - testdata/yandex-vision/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: Test Yandex Vision handwritten OCR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      YC_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.YC_SERVICE_ACCOUNT_KEY_JSON }}
      YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
      YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Yandex Cloud credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "${YC_SERVICE_ACCOUNT_KEY_JSON:-}" || (echo "YC_SERVICE_ACCOUNT_KEY_JSON is unavailable" && exit 1)
          test -n "${YC_FOLDER_ID:-}" || (echo "YC_FOLDER_ID is unavailable" && exit 1)

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -a
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Configure service account and issue IAM token
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$YC_SERVICE_ACCOUNT_KEY_JSON" > /tmp/yc-sa-key.json
          yc config profile create annword-ocr-benchmark
          yc config set service-account-key /tmp/yc-sa-key.json
          if [ -n "${YC_CLOUD_ID:-}" ]; then yc config set cloud-id "$YC_CLOUD_ID"; fi
          yc config set folder-id "$YC_FOLDER_ID"
          echo "YC_IAM_TOKEN=$(yc iam create-token)" >> "$GITHUB_ENV"

      - name: Run Yandex Vision benchmark
        run: python scripts/yandex_vision_ocr_benchmark.py

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yandex-vision-ocr-benchmark
          path: yandex-vision-benchmark/
          if-no-files-found: warn
          retention-days: 7
