name: OpenRouter OCR benchmark

on:
  push:
    branches:
      - test/easyocr-evaluation-20260718
    paths:
      - .github/workflows/openrouter-ocr-benchmark.yml
      - scripts/openrouter_ocr_benchmark.py
      - testdata/easyocr/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/openrouter-ocr-benchmark.yml
      - scripts/openrouter_ocr_benchmark.py
      - testdata/easyocr/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: Test free OpenRouter vision OCR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENROUTER: ${{ secrets.OPENROUTER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependency
        run: python -m pip install --disable-pip-version-check pillow

      - name: Validate secret
        shell: bash
        run: test -n "${OPENROUTER:-}" || (echo "GitHub secret OPENROUTER is unavailable" && exit 1)

      - name: Run OpenRouter benchmark
        run: python scripts/openrouter_ocr_benchmark.py

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openrouter-ocr-benchmark
          path: openrouter-benchmark/
          if-no-files-found: warn
          retention-days: 7
