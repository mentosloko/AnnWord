name: Production Smoke

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Smoke depth"
        required: true
        default: "quick"
        type: choice
        options:
          - quick
          - browser
      base_url:
        description: "Frontend URL"
        required: true
        default: "https://annword.ru"
        type: string
      api_url:
        description: "API URL"
        required: true
        default: "https://api.annword.ru"
        type: string

concurrency:
  group: production-smoke
  cancel-in-progress: true

jobs:
  quick:
    name: Quick HTTP smoke
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Verify frontend, routes and API
        env:
          APP_URL: ${{ inputs.base_url }}
          API_URL: ${{ inputs.api_url }}
        run: |
          set -euo pipefail
          APP_BASE="${APP_URL%/}"
          API_BASE="${API_URL%/}"

          curl --fail --silent --show-error "${APP_BASE}/release.json?run=${GITHUB_RUN_ID}" | tee /tmp/release.json
          curl --fail --silent --show-error "${API_BASE}/api/health" | tee /tmp/health.json
          grep -Eqi 'ok|healthy' /tmp/health.json

          routes=(
            /
            /practice
            /kids
            /teacher
            /premium
            /profile
            /dictionary
            /dictionary/edit
            /workspace
            /shop
            /pet
            /play/setup
            /play/classic
            /play/anagrams
            /play/one-of-two
            /play/sprint
            /play/hangman
            /play/memory
            /play/snake
          )
          for route in "${routes[@]}"; do
            code="$(curl --silent --show-error --output /tmp/page.html --write-out '%{http_code}' "${APP_BASE}${route}?smoke=${GITHUB_RUN_ID}")"
            test "$code" = "200"
            grep -Fq '<div id="root"></div>' /tmp/page.html
            echo "OK ${route}"
          done

          test_email="manual-smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}@gmail.com"
          code="$(curl --silent --show-error --output /tmp/foreign-email.json --write-out '%{http_code}' \
            -X POST "${API_BASE}/api/auth/email/account" \
            -H 'Content-Type: application/json' \
            --data "{\"email\":\"${test_email}\",\"credential\":\"SmokeProbe123!\",\"name\":\"Smoke Probe\"}")"
          cat /tmp/foreign-email.json
          test "$code" = "400"
          grep -Fq 'russian_email_domain_required' /tmp/foreign-email.json

  browser:
    name: Browser route smoke
    if: ${{ inputs.suite == 'browser' }}
    needs: quick
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke
        env:
          E2E_BASE_URL: ${{ inputs.base_url }}
          CI: "true"
        run: npx playwright test e2e/role-smoke.spec.ts --project=chromium-desktop

      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-browser-smoke
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
