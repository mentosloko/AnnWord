name: Yandex Runtime Smoke

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Deploy to Yandex Cloud
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  statuses: write

concurrency:
  group: yandex-runtime-smoke
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke Yandex frontend and API
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      YC_API_PUBLIC_URL: ${{ secrets.YC_API_PUBLIC_URL }}
      APP_URL: ${{ secrets.APP_URL }}

    steps:
      - name: Mark Yandex runtime smoke pending
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node -e 'process.stdout.write(JSON.stringify({state:"pending",context:"Yandex Runtime Smoke",description:"Verifying live Yandex frontend, API, DB and Postbox",target_url:process.env.TARGET_URL}))' > /tmp/runtime-smoke-status.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${SOURCE_SHA}" \
            --data-binary @/tmp/runtime-smoke-status.json

      - name: Validate smoke configuration
        run: |
          set -euo pipefail
          test -n "$YC_API_PUBLIC_URL"
          test -n "$APP_URL"
          printf '%s' "${YC_API_PUBLIC_URL%/}" > /tmp/api-url
          printf '%s' "${APP_URL%/}" > /tmp/frontend-url

      - name: Check API, database and Postbox
        id: api
        continue-on-error: true
        run: |
          set -euo pipefail
          API_URL="$(cat /tmp/api-url)"

          fetch_final_json() {
            local url="$1"
            local output="$2"
            local label="$3"
            local attempt http_code curl_exit

            for attempt in 1 2 3 4; do
              rm -f "${output}.tmp"
              set +e
              http_code="$(curl --silent --show-error \
                --connect-timeout 15 \
                --max-time 45 \
                --output "${output}.tmp" \
                --write-out '%{http_code}' \
                "$url")"
              curl_exit=$?
              set -e

              if [ "$curl_exit" -eq 0 ] && [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
                mv "${output}.tmp" "$output"
                cat "$output"
                printf '\n'
                return 0
              fi

              echo "$label attempt $attempt failed: curl=$curl_exit HTTP=$http_code"
              if [ "$attempt" -lt 4 ]; then
                sleep "$((attempt * 2))"
              fi
            done

            if [ -f "${output}.tmp" ]; then
              mv "${output}.tmp" "$output"
              cat "$output"
              printf '\n'
            fi
            return 1
          }

          printf '%s' 'health' > /tmp/smoke-phase-api
          fetch_final_json "$API_URL/api/health" /tmp/annword-health.json health
          printf '%s' 'database' > /tmp/smoke-phase-api
          fetch_final_json "$API_URL/api/health/db" /tmp/annword-db-health.json database
          printf '%s' 'runtime-config' > /tmp/smoke-phase-api
          fetch_final_json "$API_URL/api/runtime-config" /tmp/annword-runtime-config.json runtime-config
          printf '%s' 'weekly-status' > /tmp/smoke-phase-api
          fetch_final_json "$API_URL/api/reports/weekly/status" /tmp/annword-weekly-status.json weekly-status
          printf '%s' 'prodamus-callback' > /tmp/smoke-phase-api
          curl --fail-with-body --retry 3 --retry-all-errors -sS "$API_URL/api/payments/prodamus/notify" | tee /tmp/annword-prodamus-response.txt | grep -q "OK"

          node - <<'NODE'
          const fs = require('fs');
          const health = JSON.parse(fs.readFileSync('/tmp/annword-health.json', 'utf8'));
          const db = JSON.parse(fs.readFileSync('/tmp/annword-db-health.json', 'utf8'));
          const config = JSON.parse(fs.readFileSync('/tmp/annword-runtime-config.json', 'utf8'));
          const weekly = JSON.parse(fs.readFileSync('/tmp/annword-weekly-status.json', 'utf8'));
          if (health.status !== 'ok' || health.runtime !== 'yandex-cloud') throw new Error('API health is not Yandex/ok');
          if (db.status !== 'ok' || !db.database?.ok) throw new Error('DB health is not ok');
          if (!config.hasDatabase || !config.hasYandexOAuth || !config.hasProdamus || !config.hasObjectStorage) throw new Error('Required Yandex runtime feature is missing');
          if (!config.hasWeeklyReports || !weekly.configured) throw new Error('Weekly reports are not configured');
          if (weekly.postboxIdentityVerified !== true) throw new Error(`No verified Postbox sender; verified identities=${weekly.verifiedIdentityCount ?? 'unknown'}`);
          console.log('API, DB and Postbox checks passed');
          NODE
          printf '%s' 'passed' > /tmp/smoke-phase-api

      - name: Check authorization and closed migration endpoints
        id: security
        continue-on-error: true
        run: |
          set -euo pipefail
          API_URL="$(cat /tmp/api-url)"

          expect_status() {
            local label="$1"
            local expected="$2"
            local output="$3"
            shift 3
            local attempt code curl_exit

            for attempt in 1 2 3 4; do
              rm -f "${output}.tmp"
              set +e
              code="$(curl --silent --show-error \
                --connect-timeout 15 \
                --max-time 45 \
                --output "${output}.tmp" \
                --write-out '%{http_code}' \
                "$@")"
              curl_exit=$?
              set -e

              if [ "$curl_exit" -eq 0 ] && [ "$code" = "$expected" ]; then
                mv "${output}.tmp" "$output"
                return 0
              fi

              echo "$label attempt $attempt failed: curl=$curl_exit HTTP=$code expected=$expected"
              cat "${output}.tmp" 2>/dev/null || true
              if [ "$attempt" -lt 4 ]; then
                sleep "$((attempt * 2))"
              fi
            done

            if [ -f "${output}.tmp" ]; then
              mv "${output}.tmp" "$output"
            fi
            return 1
          }

          printf '%s' 'profile-auth' > /tmp/smoke-phase-security
          expect_status profile-auth 401 /tmp/profile-response.json "$API_URL/api/profile/me"
          printf '%s' 'admin-auth' > /tmp/smoke-phase-security
          expect_status admin-auth 401 /tmp/admin-response.json "$API_URL/api/analytics/admin"
          printf '%s' 'weekly-run-auth' > /tmp/smoke-phase-security
          expect_status weekly-run-auth 401 /tmp/weekly-run-response.json \
            -X POST "$API_URL/api/reports/weekly/run" \
            -H 'Content-Type: application/json' \
            --data '{}'

          for PATH_SUFFIX in prepare supabase; do
            printf '%s' "migration-${PATH_SUFFIX}" > /tmp/smoke-phase-security
            expect_status "migration-${PATH_SUFFIX}" 404 "/tmp/annword-migration-${PATH_SUFFIX}.json" \
              -X POST "$API_URL/api/admin/migration/$PATH_SUFFIX" \
              -H 'Content-Type: application/json' \
              --data '{"apply":false}'
          done
          printf '%s' 'passed' > /tmp/smoke-phase-security

      - name: Check frontend routes and release marker
        id: frontend
        continue-on-error: true
        run: |
          set -euo pipefail
          FRONTEND_URL="$(cat /tmp/frontend-url)"
          ROUTES=(
            / /practice /kids /teacher /landing-mix /profile /play/setup /play/classic /review
            /play/anagrams /play/one-of-two /play/sprint /play/hangman /play/memory /play/snake
            /shop /pet /onboarding/mode /onboarding/character /onboarding/family /admin /workspace
            /dictionary /dictionary/edit /premium /premium/success
          )
          for ROUTE in "${ROUTES[@]}"; do
            printf '%s' "$ROUTE" > /tmp/smoke-phase-frontend
            SAFE_ROUTE=$(printf '%s' "$ROUTE" | tr '/' '_' | tr -cd '[:alnum:]_')
            BODY_FILE="/tmp/annword-page-${SAFE_ROUTE:-root}.html"
            HTTP_CODE=$(curl -sSL --retry 3 --retry-all-errors -o "$BODY_FILE" -w '%{http_code}' "$FRONTEND_URL$ROUTE")
            if [ "$HTTP_CODE" != "200" ]; then
              echo "Route $ROUTE returned final HTTP $HTTP_CODE"
              exit 1
            fi
            if ! grep -q 'AnnWord' "$BODY_FILE"; then
              echo "Route $ROUTE did not return the AnnWord SPA shell"
              exit 1
            fi
          done
          printf '%s' 'release-marker' > /tmp/smoke-phase-frontend
          curl --fail-with-body --retry 3 --retry-all-errors -sS --output /tmp/annword-release.json "$FRONTEND_URL/release.json"
          cat /tmp/annword-release.json
          SOURCE_SHA="$SOURCE_SHA" node - <<'NODE'
          const fs = require('fs');
          const release = JSON.parse(fs.readFileSync('/tmp/annword-release.json', 'utf8'));
          if (!release.sha || !release.builtAt) throw new Error('Frontend release marker is incomplete');
          if (release.sha !== process.env.SOURCE_SHA) throw new Error(`Frontend SHA ${release.sha} does not match deployed source ${process.env.SOURCE_SHA}`);
          NODE
          printf '%s' 'passed' > /tmp/smoke-phase-frontend

      - name: Upload runtime smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: annword-yandex-runtime-smoke
          path: |
            /tmp/smoke-phase-*
            /tmp/annword-health.json
            /tmp/annword-db-health.json
            /tmp/annword-runtime-config.json
            /tmp/annword-weekly-status.json
            /tmp/annword-prodamus-response.txt
            /tmp/profile-response.json
            /tmp/admin-response.json
            /tmp/weekly-run-response.json
            /tmp/annword-migration-*.json
            /tmp/annword-release.json
          if-no-files-found: ignore
          retention-days: 5

      - name: Assert all runtime smoke sections passed
        env:
          API_OUTCOME: ${{ steps.api.outcome }}
          SECURITY_OUTCOME: ${{ steps.security.outcome }}
          FRONTEND_OUTCOME: ${{ steps.frontend.outcome }}
        run: |
          echo "API=$API_OUTCOME security=$SECURITY_OUTCOME frontend=$FRONTEND_OUTCOME"
          test "$API_OUTCOME" = "success"
          test "$SECURITY_OUTCOME" = "success"
          test "$FRONTEND_OUTCOME" = "success"

      - name: Publish Yandex runtime smoke status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATE="success"
            DESCRIPTION="Live Yandex frontend, API, DB and Postbox verified"
          else
            STATE="failure"
            DESCRIPTION="Yandex runtime smoke failed"
          fi
          export STATE DESCRIPTION
          node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,context:"Yandex Runtime Smoke",description:process.env.DESCRIPTION,target_url:process.env.TARGET_URL}))' > /tmp/runtime-smoke-status.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${SOURCE_SHA}" \
            --data-binary @/tmp/runtime-smoke-status.json
