name: Yandex Data Migration

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Write data into Yandex PostgreSQL"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      include_game_events:
        description: "Copy game_events"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      include_analytics:
        description: "Copy analytics_events"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: yandex-data-migration
  cancel-in-progress: false

jobs:
  migrate-core-data:
    name: Migrate core data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Apply Yandex schema migrations first
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:yandex:migrate

      - name: Run user skeleton migration
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANNWORD_MIGRATION_APPLY: ${{ inputs.apply }}
          ANNWORD_MIGRATION_EMAIL_CONFLICT: skip
        run: npm run db:migrate:users

      - name: Run core data migration
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANNWORD_MIGRATION_APPLY: ${{ inputs.apply }}
          ANNWORD_MIGRATION_INCLUDE_GAME_EVENTS: ${{ inputs.include_game_events }}
          ANNWORD_MIGRATION_INCLUDE_ANALYTICS: ${{ inputs.include_analytics }}
        run: npm run db:migrate:core
