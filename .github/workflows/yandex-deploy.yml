name: Deploy to Yandex Cloud

on:
  workflow_dispatch:
  push:
    branches:
      - infra/ru-cloud-migration

concurrency:
  group: yandex-cloud-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  YC_BACKEND_IMAGE: annword-api
  AWS_DEFAULT_REGION: ru-central1

jobs:
  build-and-deploy:
    name: Build and deploy Yandex Cloud preview
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run lint

      - name: Yandex deploy env smoke check
        env:
          YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
          YC_SERVICE_ACCOUNT_ID: ${{ secrets.YC_SERVICE_ACCOUNT_ID }}
          YC_REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}
          YC_SERVERLESS_CONTAINER_ID: ${{ secrets.YC_SERVERLESS_CONTAINER_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_FRONTEND_BUCKET: ${{ secrets.S3_FRONTEND_BUCKET }}
          S3_ASSETS_BUCKET: ${{ secrets.S3_ASSETS_BUCKET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          PRODAMUS_SECRET: ${{ secrets.PRODAMUS_SECRET }}
          YANDEX_CLIENT_ID: ${{ secrets.YANDEX_CLIENT_ID }}
          YANDEX_CLIENT_SECRET: ${{ secrets.YANDEX_CLIENT_SECRET }}
        run: npm run api:check

      - name: Build frontend
        env:
          VITE_API_URL: ${{ secrets.YC_API_PUBLIC_URL }}
        run: npm run build

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -a
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Configure Yandex Cloud CLI
        env:
          YC_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.YC_SERVICE_ACCOUNT_KEY_JSON }}
          YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
        run: |
          printf '%s' "$YC_SERVICE_ACCOUNT_KEY_JSON" > yc-sa-key.json
          yc config profile create annword-deploy
          yc config set service-account-key yc-sa-key.json
          yc config set cloud-id "$YC_CLOUD_ID"
          yc config set folder-id "$YC_FOLDER_ID"

      - name: Login to Yandex Container Registry
        run: yc container registry configure-docker --hostname cr.yandex --force

      - name: Build and push backend image
        env:
          YC_REGISTRY_ID: ${{ secrets.YC_REGISTRY_ID }}
        run: |
          IMAGE="cr.yandex/${YC_REGISTRY_ID}/${YC_BACKEND_IMAGE}:${GITHUB_SHA}"
          docker build -f Dockerfile.api -t "$IMAGE" .
          docker push "$IMAGE"
          echo "BACKEND_IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy backend serverless container revision
        env:
          YC_SERVERLESS_CONTAINER_ID: ${{ secrets.YC_SERVERLESS_CONTAINER_ID }}
          YC_SERVICE_ACCOUNT_ID: ${{ secrets.YC_SERVICE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          PRODAMUS_SECRET: ${{ secrets.PRODAMUS_SECRET }}
          YANDEX_CLIENT_ID: ${{ secrets.YANDEX_CLIENT_ID }}
          YANDEX_CLIENT_SECRET: ${{ secrets.YANDEX_CLIENT_SECRET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_FRONTEND_BUCKET: ${{ secrets.S3_FRONTEND_BUCKET }}
          S3_ASSETS_BUCKET: ${{ secrets.S3_ASSETS_BUCKET }}
          APP_URL: ${{ secrets.APP_URL }}
          API_URL: ${{ secrets.API_URL }}
          YC_API_PUBLIC_URL: ${{ secrets.YC_API_PUBLIC_URL }}
        run: |
          yc serverless container revision deploy \
            --container-id "$YC_SERVERLESS_CONTAINER_ID" \
            --image "$BACKEND_IMAGE" \
            --service-account-id "$YC_SERVICE_ACCOUNT_ID" \
            --cores 1 \
            --memory 512M \
            --execution-timeout 30s \
            --concurrency 16 \
            --environment NODE_ENV=production \
            --environment PORT=8080 \
            --environment DATABASE_URL="$DATABASE_URL" \
            --environment SESSION_SECRET="$SESSION_SECRET" \
            --environment JWT_SECRET="$JWT_SECRET" \
            --environment COOKIE_SECRET="$COOKIE_SECRET" \
            --environment PRODAMUS_SECRET="$PRODAMUS_SECRET" \
            --environment YANDEX_CLIENT_ID="$YANDEX_CLIENT_ID" \
            --environment YANDEX_CLIENT_SECRET="$YANDEX_CLIENT_SECRET" \
            --environment S3_ACCESS_KEY_ID="$S3_ACCESS_KEY_ID" \
            --environment S3_SECRET_ACCESS_KEY="$S3_SECRET_ACCESS_KEY" \
            --environment S3_ENDPOINT="$S3_ENDPOINT" \
            --environment S3_FRONTEND_BUCKET="$S3_FRONTEND_BUCKET" \
            --environment S3_ASSETS_BUCKET="$S3_ASSETS_BUCKET" \
            --environment APP_URL="$APP_URL" \
            --environment API_URL="$API_URL" \
            --environment YC_API_PUBLIC_URL="$YC_API_PUBLIC_URL"

      - name: Install AWS CLI for Object Storage upload
        run: python -m pip install --user --upgrade awscli

      - name: Upload frontend to Yandex Object Storage
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_FRONTEND_BUCKET: ${{ secrets.S3_FRONTEND_BUCKET }}
        run: |
          python -m awscli --endpoint-url "$S3_ENDPOINT" s3 sync dist "s3://${S3_FRONTEND_BUCKET}" --delete

      - name: Deployment summary
        run: |
          echo "Backend image: $BACKEND_IMAGE" >> "$GITHUB_STEP_SUMMARY"
          echo "Frontend bucket: ${{ secrets.S3_FRONTEND_BUCKET }}" >> "$GITHUB_STEP_SUMMARY"
