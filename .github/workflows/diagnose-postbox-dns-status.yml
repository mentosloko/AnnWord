name: Observe Postbox DNS Write

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    name: Observe DKIM DNS write
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Mark DNS diagnostic pending
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node -e 'process.stdout.write(JSON.stringify({state:"pending",context:"Yandex DNS Write Diagnostic",description:"Testing DKIM CNAME write",target_url:process.env.TARGET_URL}))' > /tmp/status.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json

      - name: Test Yandex DNS write
        env:
          YC_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.YC_SERVICE_ACCOUNT_KEY_JSON }}
          YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
        run: |
          set -euo pipefail
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -a
          YC="$HOME/yandex-cloud/bin/yc"
          printf '%s' "$YC_SERVICE_ACCOUNT_KEY_JSON" > /tmp/yc-sa-key.json
          $YC config profile create annword-dns-observer
          $YC config set service-account-key /tmp/yc-sa-key.json
          $YC config set cloud-id "$YC_CLOUD_ID"
          $YC config set folder-id "$YC_FOLDER_ID"
          $YC resource-manager folder list-access-bindings --id "$YC_FOLDER_ID" --format json > /tmp/folder-access-bindings.json
          $YC dns zone list --format json > /tmp/dns-zones.json

          node - <<'NODE'
          const fs = require('fs');
          const zones = JSON.parse(fs.readFileSync('/tmp/dns-zones.json', 'utf8'));
          const zone = zones.find(item => String(item.zone || '').replace(/\.$/, '').toLowerCase() === 'annword.ru');
          if (!zone?.id) throw new Error('annword.ru zone not found');
          fs.writeFileSync('/tmp/dns-zone-id', zone.id);
          NODE

          IAM_TOKEN="$($YC iam create-token)"
          curl -fsS -H "X-YaCloud-SubjectToken: $IAM_TOKEN" \
            'https://postbox.cloud.yandex.net/v2/email/identities/annword.ru' \
            -o /tmp/identity.json
          TOKEN="$(node -e 'const fs=require("fs");const x=JSON.parse(fs.readFileSync("/tmp/identity.json","utf8"));process.stdout.write(String(x.DkimAttributes?.Tokens?.[0]||""));')"
          test -n "$TOKEN"
          ZONE_ID="$(cat /tmp/dns-zone-id)"
          RECORD_NAME="${TOKEN}._domainkey.annword.ru."
          RECORD_TARGET="${TOKEN}.dkim.amazonses.com."

          set +e
          DNS_OUTPUT="$($YC dns zone replace-records --id "$ZONE_ID" --record "$RECORD_NAME 300 CNAME $RECORD_TARGET" 2>&1)"
          DNS_CODE=$?
          set -e
          printf '%s' "$DNS_CODE" > /tmp/dns-write-code
          printf '%s' "$DNS_OUTPUT" > /tmp/dns-write-output

          DEPLOY_SA_ID="$(node -e 'const fs=require("fs");const x=JSON.parse(fs.readFileSync("/tmp/yc-sa-key.json","utf8"));process.stdout.write(String(x.service_account_id||x.serviceAccountId||""));')"
          DEPLOY_SA_ID="$DEPLOY_SA_ID" DNS_CODE="$DNS_CODE" node - <<'NODE'
          const fs = require('fs');
          const bindings = JSON.parse(fs.readFileSync('/tmp/folder-access-bindings.json', 'utf8'));
          const items = Array.isArray(bindings) ? bindings : (bindings.access_bindings || bindings.accessBindings || []);
          const id = process.env.DEPLOY_SA_ID;
          const roles = items.filter(item => String(item.subject?.id || item.subjectId || '') === id)
            .map(item => item.role_id || item.roleId || item.role || null).filter(Boolean).sort();
          fs.writeFileSync('/tmp/dns-write-summary.json', JSON.stringify({serviceAccountId:id,directFolderRoles:roles,dnsWriteExitCode:Number(process.env.DNS_CODE)}, null, 2));
          NODE

          cat /tmp/dns-write-summary.json
          cat /tmp/dns-write-output
          test "$DNS_CODE" = "0"

      - name: Upload DNS diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: annword-postbox-dns-status
          path: |
            /tmp/dns-write-summary.json
            /tmp/dns-write-code
            /tmp/dns-write-output
          if-no-files-found: ignore
          retention-days: 3

      - name: Publish DNS diagnostic status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATE=success
            DESCRIPTION='DKIM CNAME write succeeded'
          else
            STATE=failure
            DESCRIPTION='DKIM CNAME write failed'
          fi
          export STATE DESCRIPTION
          node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,context:"Yandex DNS Write Diagnostic",description:process.env.DESCRIPTION,target_url:process.env.TARGET_URL}))' > /tmp/status.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json
