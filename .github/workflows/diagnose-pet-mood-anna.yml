name: Diagnose Anna pet mood in Yandex

on:
  push:
    branches:
      - diagnostics/pet-mood-anna

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    name: Yandex Pet Mood Diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      USER_ID: d1dadbb4-924a-46a4-8e4f-3ac8d9f700cd
      FIX_RELEASE_SHA: 3aa4a28ff9cf4acf860b1380f83740a602620ad3

    steps:
      - name: Mark diagnostic pending
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node -e 'process.stdout.write(JSON.stringify({state:"pending",context:"Yandex Pet Mood Diagnostic",description:"Reading sanitized production state",target_url:process.env.TARGET_URL}))' > /tmp/status.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json

      - name: Read sanitized state through Yandex backend
        id: read
        continue-on-error: true
        env:
          YC_API_PUBLIC_URL: ${{ secrets.YC_API_PUBLIC_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -u
          API_BASE="${YC_API_PUBLIC_URL%/}"
          RELEASE_BODY="$(curl -sS --retry 3 --retry-all-errors "${API_BASE}/release.json" || true)"
          RELEASE_SHA="$(printf '%s' "$RELEASE_BODY" | node -e 'let s="";process.stdin.on("data",d=>s+=d).on("end",()=>{try{process.stdout.write(JSON.parse(s).sha||"")}catch{process.stdout.write("")}})')"
          DIAGNOSTIC_TOKEN="$(node -e 'const {createHmac}=require("crypto"); process.stdout.write(createHmac("sha256", process.env.JWT_SECRET).update(`pet-mood-diagnostic:${process.env.USER_ID}`).digest("hex"));')"
          HTTP_CODE="$(curl -sS --retry 3 --retry-all-errors -o /tmp/pet-mood-response.json -w '%{http_code}' \
            "${API_BASE}/api/profile/internal-diagnostic/pet-mood/${USER_ID}" \
            -H "x-annword-diagnostic-secret: ${DIAGNOSTIC_TOKEN}" || echo 000)"
          RELEASE_SHA="$RELEASE_SHA" HTTP_CODE="$HTTP_CODE" node <<'NODE'
          const fs = require('fs');
          let response = null;
          try { response = JSON.parse(fs.readFileSync('/tmp/pet-mood-response.json', 'utf8')); } catch {}
          const output = {
            expectedReleaseSha: process.env.FIX_RELEASE_SHA,
            actualReleaseSha: process.env.RELEASE_SHA || null,
            httpCode: process.env.HTTP_CODE,
            response,
          };
          fs.writeFileSync('/tmp/pet-mood-diagnostic.json', JSON.stringify(output, null, 2));
          console.log(JSON.stringify(output, null, 2));
          const pet = response?.profile?.pet || {};
          const diagnostic = response?.decayDiagnostic || {};
          fs.writeFileSync('/tmp/status-description.txt', `release=${process.env.RELEASE_SHA || 'n/a'} http=${process.env.HTTP_CODE} mood=${pet.moodScore ?? 'n/a'} anchor=${diagnostic.moodUpdatedAt ?? 'n/a'}`.slice(0, 130));
          const ok = process.env.RELEASE_SHA === process.env.FIX_RELEASE_SHA
            && process.env.HTTP_CODE === '200'
            && pet.moodScore === 0
            && Boolean(diagnostic.moodUpdatedAt);
          fs.writeFileSync('/tmp/diagnostic-ok.txt', ok ? 'true' : 'false');
          NODE

      - name: Upload diagnostic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pet-mood-diagnostic
          path: /tmp/pet-mood-diagnostic.json
          retention-days: 1

      - name: Assert production state
        run: test "$(cat /tmp/diagnostic-ok.txt 2>/dev/null || echo false)" = "true"

      - name: Publish diagnostic status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          STATE="failure"
          DESCRIPTION="$(cat /tmp/status-description.txt 2>/dev/null || echo 'Yandex pet mood diagnostic failed')"
          if [ "$JOB_STATUS" = "success" ]; then STATE="success"; fi
          STATE="$STATE" DESCRIPTION="$DESCRIPTION" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,context:"Yandex Pet Mood Diagnostic",description:process.env.DESCRIPTION,target_url:process.env.TARGET_URL}))' > /tmp/status.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json
