name: Diagnose Anna pet mood in Yandex

on:
  push:
    branches:
      - diagnostics/pet-mood-anna

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    name: Yandex Pet Mood Diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      USER_ID: d1dadbb4-924a-46a4-8e4f-3ac8d9f700cd

    steps:
      - name: Mark diagnostic pending
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node -e 'process.stdout.write(JSON.stringify({state:"pending",context:"Yandex Pet Mood Diagnostic",description:"Reading sanitized production state",target_url:process.env.TARGET_URL}))' > /tmp/status.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json

      - name: Install PostgreSQL client library
        run: npm install --no-save --no-package-lock pg@8.16.3

      - name: Read sanitized Yandex PostgreSQL state
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          node <<'NODE'
          const { Client } = require('pg');
          const fs = require('fs');

          const userId = process.env.USER_ID;
          const rawUrl = process.env.DATABASE_URL;
          const write = (output, state = 'success', description = 'Production pet state read') => {
            fs.writeFileSync('/tmp/pet-mood-diagnostic.json', JSON.stringify(output, null, 2));
            fs.writeFileSync('/tmp/diagnostic-state.txt', state);
            fs.writeFileSync('/tmp/status-description.txt', String(description).slice(0, 130));
            console.log('PET_MOOD_DIAGNOSTIC=' + JSON.stringify(output, null, 2));
          };

          if (!rawUrl) {
            write({ error: 'DATABASE_URL is missing' }, 'failure', 'DATABASE_URL is missing');
            process.exit(0);
          }

          let connectionString = rawUrl;
          try {
            const url = new URL(rawUrl);
            ['sslmode', 'sslcert', 'sslkey', 'sslrootcert'].forEach(key => url.searchParams.delete(key));
            connectionString = url.toString();
          } catch {}

          const quote = value => `"${String(value).replaceAll('"', '""')}"`;
          const client = new Client({ connectionString, ssl: { rejectUnauthorized: false }, connectionTimeoutMillis: 7000 });

          (async () => {
            try {
              await client.connect();
              const now = await client.query('select now() as server_now');
              const profileResult = await client.query('select to_jsonb(p) as profile from profiles p where id = $1', [userId]);
              if (!profileResult.rows[0]?.profile) throw new Error('Profile not found');
              const rawProfile = profileResult.rows[0].profile;
              const profile = {
                id: rawProfile.id,
                username: rawProfile.username,
                role: rawProfile.role,
                accountMode: rawProfile.account_mode,
                subscriptionTier: rawProfile.subscription_tier,
                createdAt: rawProfile.created_at || null,
                updatedAt: rawProfile.updated_at || null,
                pet: rawProfile.pet || {},
                gamesPlayed: rawProfile.stats?.gamesPlayed ?? rawProfile.stats?.games_played ?? null,
                gamesWon: rawProfile.stats?.gamesWon ?? rawProfile.stats?.games_won ?? null,
              };

              const userColumnsResult = await client.query(
                `select column_name from information_schema.columns where table_schema = 'public' and table_name = 'users'`,
              );
              const userColumns = new Set(userColumnsResult.rows.map(row => row.column_name));
              const safeUserColumns = ['id', 'email', 'created_at', 'updated_at', 'last_login_at', 'last_seen_at']
                .filter(column => userColumns.has(column));
              let user = null;
              if (safeUserColumns.length > 0) {
                const result = await client.query(
                  `select ${safeUserColumns.map(quote).join(', ')} from users where id = $1`,
                  [userId],
                );
                user = result.rows[0] || null;
              }

              const columnsResult = await client.query(
                `select table_name, array_agg(column_name order by ordinal_position) as columns
                   from information_schema.columns
                  where table_schema = 'public'
                  group by table_name
                  having bool_or(column_name = 'user_id') or bool_or(column_name = 'learner_user_id')`,
              );
              const timestampCandidates = ['created_at', 'updated_at', 'completed_at', 'occurred_at', 'played_at', 'last_active_at', 'sent_at'];
              const activity = [];
              for (const row of columnsResult.rows) {
                const columns = new Set(row.columns);
                const ownerColumn = columns.has('user_id') ? 'user_id' : 'learner_user_id';
                const timestampColumn = timestampCandidates.find(column => columns.has(column));
                const lastExpression = timestampColumn ? `max(${quote(timestampColumn)})` : 'null';
                try {
                  const result = await client.query(
                    `select count(*)::int as count, ${lastExpression} as last_time from ${quote(row.table_name)} where ${quote(ownerColumn)} = $1`,
                    [userId],
                  );
                  if ((result.rows[0]?.count || 0) > 0) activity.push({ table: row.table_name, ownerColumn, ...result.rows[0] });
                } catch (error) {
                  activity.push({ table: row.table_name, ownerColumn, diagnosticError: error.message });
                }
              }

              const output = { serverNow: now.rows[0].server_now, profile, user, activity };
              const pet = profile.pet || {};
              write(output, 'success', `mood=${pet.moodScore ?? pet.mood_score ?? 'n/a'} last=${pet.lastDailyActivityDate ?? pet.last_daily_activity_date ?? 'n/a'} profile=${String(profile.updatedAt || 'n/a').slice(0, 10)}`);
            } catch (error) {
              write({ error: error instanceof Error ? error.message : String(error) }, 'failure', error instanceof Error ? error.message : String(error));
            } finally {
              await client.end().catch(() => undefined);
            }
          })();
          NODE

      - name: Upload diagnostic artifact
        uses: actions/upload-artifact@v4
        with:
          name: pet-mood-diagnostic
          path: /tmp/pet-mood-diagnostic.json
          retention-days: 1

      - name: Publish diagnostic status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          STATE="$(cat /tmp/diagnostic-state.txt 2>/dev/null || echo failure)"
          DESCRIPTION="$(cat /tmp/status-description.txt 2>/dev/null || echo 'Yandex pet mood diagnostic failed')"
          STATE="$STATE" DESCRIPTION="$DESCRIPTION" node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,context:"Yandex Pet Mood Diagnostic",description:process.env.DESCRIPTION,target_url:process.env.TARGET_URL}))' > /tmp/status.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json
