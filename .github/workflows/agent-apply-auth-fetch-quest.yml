name: Agent Apply Auth Fetch Quest Patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/restore-password-registration-fix-fetch-quest'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/restore-password-registration-fix-fetch-quest
          fetch-depth: 0
      - name: Detect patch script
        id: detect
        run: |
          if [ -f scripts/agent_restore_auth_fetch_quest.py ]; then
            echo "apply=true" >> "$GITHUB_OUTPUT"
          else
            echo "apply=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Correct reward modal patch target
        if: steps.detect.outputs.apply == 'true'
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          path = Path('scripts/agent_restore_auth_fetch_quest.py')
          text = path.read_text()
          pattern = re.compile(
              r"replace_once\(\n\s*'components/DailyQuestCard\.tsx',\n\s*\"  const safeStreakDays = Math\.max\(0, Math\.round\(streakDays \|\| 0\)\);\",\n\s*\"  const safeStreakDays = Math\.max\(0, Math\.round\(streakDays \|\| 0\)\);\\n  const pending = reward\.pending === true;\",\n\s*\)",
              re.MULTILINE,
          )
          replacement = '''replace_once(
              'components/DailyQuestCard.tsx',
              "  const imageUrl = reward.item ? getShopImageUrl(reward.item) : null;\\n  const safeStreakDays = Math.max(0, Math.round(streakDays || 0));",
              "  const imageUrl = reward.item ? getShopImageUrl(reward.item) : null;\\n  const safeStreakDays = Math.max(0, Math.round(streakDays || 0));\\n  const pending = reward.pending === true;",
          )'''
          text, count = pattern.subn(lambda _match: replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'Reward modal patch block matches: {count}')
          path.write_text(text)
          PY
      - name: Apply guarded patch
        if: steps.detect.outputs.apply == 'true'
        run: |
          set -o pipefail
          python3 scripts/agent_restore_auth_fetch_quest.py 2>&1 | tee /tmp/auth-fetch-quest-patch.log
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auth-fetch-quest-patch-log
          path: /tmp/auth-fetch-quest-patch.log
          if-no-files-found: warn
          retention-days: 1
      - name: Commit product changes
        if: steps.detect.outputs.apply == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f scripts/agent_restore_auth_fetch_quest.py
          git add .
          git commit -m "Restore password registration and harden runtime flows"
          git push origin HEAD:agent/restore-password-registration-fix-fetch-quest
