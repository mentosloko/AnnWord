name: Fix PetRoom syntax

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/magic-link-recovery-stable-notices
          fetch-depth: 0
      - name: Remove stray JSX brace
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('components/PetRoom.tsx')
          text = path.read_text()
          old = '</div>}</div></div>'
          if old not in text:
              raise SystemExit('Expected stray JSX brace not found')
          path.write_text(text.replace(old, '</div></div></div>', 1))
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add components/PetRoom.tsx
          git commit -m "Fix PetRoom speech bubble JSX"
          git push origin HEAD:agent/magic-link-recovery-stable-notices
