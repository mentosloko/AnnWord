name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        run: npm run lint

      - name: Unit tests
        id: unit_tests
        run: npm run check:unit -- --reporter=json --outputFile=vitest-results.json
        continue-on-error: true

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: vitest-results.json
          if-no-files-found: ignore

      - name: Fail on unit test errors
        if: steps.unit_tests.outcome == 'failure'
        run: exit 1

      - name: Smoke checks
        id: smoke_checks
        run: |
          set -o pipefail
          npm run check:smoke 2>&1 | tee smoke-results.log
        continue-on-error: true

      - name: Upload smoke check log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-results
          path: smoke-results.log
          if-no-files-found: ignore

      - name: Fail on smoke check errors
        if: steps.smoke_checks.outcome == 'failure'
        run: exit 1

      - name: Build
        run: npm exec -- vite build
