name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --silent --no-audit --fund=false
          else
            npm install --silent --no-audit --fund=false
          fi

      - name: Lint
        run: npm exec -- tsc --noEmit --pretty false

      - name: Unit tests
        run: npm run check:unit

      - name: Smoke checks
        run: npm run check:smoke

      - name: Build
        run: npm exec -- vite build
