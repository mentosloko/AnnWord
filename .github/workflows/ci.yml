name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Quiet git advice
        run: |
          git config --global advice.detachedHead false
          git config --global init.defaultBranch main

      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --silent --no-audit --fund=false
          else
            npm install --silent --no-audit --fund=false
          fi

      - name: Lint
        run: npm exec -- tsc --noEmit --pretty false

      - name: Unit tests
        run: |
          set +e
          npm exec -- vitest run --reporter=dot > unit.log 2>&1
          code=$?
          tail -n 80 unit.log
          exit $code

      - name: Smoke checks
        run: npm run check:smoke

      - name: Build
        run: npm exec -- vite build
