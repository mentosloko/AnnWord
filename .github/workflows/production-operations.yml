name: Production Operations

on:
  schedule:
    - cron: '17 */2 * * *'
    - cron: '40 3 * * 0'
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation to run'
        required: true
        default: all
        type: choice
        options: [all, monitor, backups]
  workflow_run:
    workflows:
      - Deploy to Yandex Cloud
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  statuses: write

concurrency:
  group: production-operations
  cancel-in-progress: true

env:
  ALERT_EMAIL: mentosloko@gmail.com
  ALERT_FROM_EMAIL: ${{ secrets.WEEKLY_REPORT_FROM_EMAIL }}
  SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  monitor:
    name: Monitor production
    if: ${{ github.event.schedule == '17 */2 * * *' || (github.event_name == 'workflow_dispatch' && (inputs.operation == 'monitor' || inputs.operation == 'all')) || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Check frontend, API, database and reports
        id: check
        continue-on-error: true
        env:
          APP_URL: ${{ secrets.APP_URL }}
          API_URL: ${{ secrets.YC_API_PUBLIC_URL }}
        run: |
          set -euo pipefail
          APP_BASE="${APP_URL%/}"
          API_BASE="${API_URL%/}"
          test -n "$APP_BASE"
          test -n "$API_BASE"

          check_url() {
            local label="$1" url="$2" expected="$3" body="/tmp/${1}.body" code=""
            for attempt in 1 2 3; do
              code="$(curl --silent --show-error --location --connect-timeout 15 --max-time 45 --output "$body" --write-out '%{http_code}' "$url" || true)"
              if [ "$code" = "200" ] && grep -Eqi "$expected" "$body"; then
                echo "OK $label"
                return 0
              fi
              echo "$label attempt $attempt failed: HTTP=$code"
              cat "$body" 2>/dev/null || true
              sleep "$((attempt * 4))"
            done
            return 1
          }

          failures=0
          check_url frontend "$APP_BASE/release.json?monitor=${GITHUB_RUN_ID}" 'sha' || failures=$((failures + 1))
          check_url api "$API_BASE/api/health" 'ok|healthy' || failures=$((failures + 1))
          check_url database "$API_BASE/api/health/db" '"ok"[[:space:]]*:[[:space:]]*true' || failures=$((failures + 1))
          check_url reports "$API_BASE/api/reports/weekly/status" '"configured"[[:space:]]*:[[:space:]]*true' || failures=$((failures + 1))
          if [ "$failures" -gt 0 ]; then
            printf 'AnnWord production monitor found %s failed check(s).\nFrontend: %s\nAPI: %s\nRun: https://github.com/%s/actions/runs/%s\n' "$failures" "$APP_BASE" "$API_BASE" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID" > /tmp/alert.txt
            exit 1
          fi

      - name: Configure Yandex Cloud for failure email
        if: ${{ steps.check.outcome == 'failure' }}
        env:
          YC_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.YC_SERVICE_ACCOUNT_KEY_JSON }}
          YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
        run: |
          set -euo pipefail
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -a
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"
          printf '%s' "$YC_SERVICE_ACCOUNT_KEY_JSON" > /tmp/yc-key.json
          "$HOME/yandex-cloud/bin/yc" config profile create annword-monitor
          "$HOME/yandex-cloud/bin/yc" config set service-account-key /tmp/yc-key.json
          "$HOME/yandex-cloud/bin/yc" config set cloud-id "$YC_CLOUD_ID"
          "$HOME/yandex-cloud/bin/yc" config set folder-id "$YC_FOLDER_ID"

      - name: Send monitoring failure email
        if: ${{ steps.check.outcome == 'failure' }}
        run: |
          set -euo pipefail
          test -n "$ALERT_FROM_EMAIL"
          IAM_TOKEN="$(yc iam create-token)"
          SUBJECT='AnnWord: production недоступен'
          BODY="$(cat /tmp/alert.txt)"
          SUBJECT="$SUBJECT" BODY="$BODY" node -e 'const fs=require("fs");fs.writeFileSync("/tmp/postbox.json",JSON.stringify({FromEmailAddress:process.env.ALERT_FROM_EMAIL,Destination:{ToAddresses:[process.env.ALERT_EMAIL]},Content:{Simple:{Subject:{Data:process.env.SUBJECT,Charset:"UTF-8"},Body:{Text:{Data:process.env.BODY,Charset:"UTF-8"}}}}}))'
          curl --fail-with-body --silent --show-error -X POST https://postbox.cloud.yandex.net/v2/email/outbound-emails -H 'Content-Type: application/json' -H "X-YaCloud-SubjectToken: $IAM_TOKEN" --data-binary @/tmp/postbox.json

      - name: Assert production is healthy
        if: always()
        env:
          CHECK_OUTCOME: ${{ steps.check.outcome }}
        run: test "$CHECK_OUTCOME" = success

  backups:
    name: Guard PostgreSQL backups
    if: ${{ github.event.schedule == '40 3 * * 0' || (github.event_name == 'workflow_dispatch' && (inputs.operation == 'backups' || inputs.operation == 'all')) || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install and configure Yandex Cloud CLI
        env:
          YC_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.YC_SERVICE_ACCOUNT_KEY_JSON }}
          YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
        run: |
          set -euo pipefail
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -a
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"
          printf '%s' "$YC_SERVICE_ACCOUNT_KEY_JSON" > /tmp/yc-key.json
          "$HOME/yandex-cloud/bin/yc" config profile create annword-backups
          "$HOME/yandex-cloud/bin/yc" config set service-account-key /tmp/yc-key.json
          "$HOME/yandex-cloud/bin/yc" config set cloud-id "$YC_CLOUD_ID"
          "$HOME/yandex-cloud/bin/yc" config set folder-id "$YC_FOLDER_ID"

      - name: Apply and verify backup policy
        id: audit
        continue-on-error: true
        env:
          CONFIGURED_CLUSTER_ID: ${{ secrets.YC_POSTGRES_CLUSTER_ID }}
        run: |
          set -euo pipefail
          CLUSTER_ID="${CONFIGURED_CLUSTER_ID:-}"
          if [ -z "$CLUSTER_ID" ]; then
            yc managed-postgresql cluster list --format json > /tmp/clusters.json
            test "$(jq 'length' /tmp/clusters.json)" = "1"
            CLUSTER_ID="$(jq -r '.[0].id' /tmp/clusters.json)"
          fi
          yc managed-postgresql cluster update --id "$CLUSTER_ID" --backup-window-start 02:00:00 --backup-retain-period-days 30 --deletion-protection
          yc managed-postgresql cluster get --id "$CLUSTER_ID" --format json > /tmp/cluster.json
          yc managed-postgresql backup list --format json > /tmp/backups.json
          CLUSTER_ID="$CLUSTER_ID" node - <<'NODE'
          const fs = require('fs');
          const cluster = JSON.parse(fs.readFileSync('/tmp/cluster.json', 'utf8'));
          const backups = JSON.parse(fs.readFileSync('/tmp/backups.json', 'utf8'));
          const id = process.env.CLUSTER_ID;
          const retention = Number(cluster?.config?.backupRetainPeriodDays ?? cluster?.config?.backup_retain_period_days ?? cluster?.config?.backupRetainPeriod ?? 0);
          if (retention < 30) throw new Error(`Backup retention is ${retention} days.`);
          if (cluster.deletionProtection !== true && cluster.deletion_protection !== true) throw new Error('Deletion protection is disabled.');
          const own = backups.filter(item => (item.clusterId ?? item.cluster_id) === id);
          if (!own.length) throw new Error('No backups found for production PostgreSQL.');
          const newest = own.map(item => Date.parse(item.createdAt ?? item.created_at ?? '')).filter(Number.isFinite).sort((a,b) => b-a)[0];
          if (!newest || Date.now() - newest > 48 * 60 * 60 * 1000) throw new Error('Newest PostgreSQL backup is older than 48 hours.');
          console.log(`Backup policy verified: retention=${retention}, newest=${new Date(newest).toISOString()}`);
          NODE

      - name: Send backup failure email
        if: ${{ steps.audit.outcome == 'failure' }}
        run: |
          set -euo pipefail
          test -n "$ALERT_FROM_EMAIL"
          IAM_TOKEN="$(yc iam create-token)"
          SUBJECT='AnnWord: проблема с резервными копиями'
          BODY="AnnWord PostgreSQL backup audit failed. Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          SUBJECT="$SUBJECT" BODY="$BODY" node -e 'const fs=require("fs");fs.writeFileSync("/tmp/postbox.json",JSON.stringify({FromEmailAddress:process.env.ALERT_FROM_EMAIL,Destination:{ToAddresses:[process.env.ALERT_EMAIL]},Content:{Simple:{Subject:{Data:process.env.SUBJECT,Charset:"UTF-8"},Body:{Text:{Data:process.env.BODY,Charset:"UTF-8"}}}}}))'
          curl --fail-with-body --silent --show-error -X POST https://postbox.cloud.yandex.net/v2/email/outbound-emails -H 'Content-Type: application/json' -H "X-YaCloud-SubjectToken: $IAM_TOKEN" --data-binary @/tmp/postbox.json

      - name: Assert backup policy is healthy
        if: always()
        env:
          AUDIT_OUTCOME: ${{ steps.audit.outcome }}
        run: test "$AUDIT_OUTCOME" = success

  report:
    name: Publish production operations status
    if: ${{ always() && (github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success') }}
    needs: [monitor, backups]
    runs-on: ubuntu-latest
    steps:
      - name: Publish combined operations status
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          MONITOR_RESULT: ${{ needs.monitor.result }}
          BACKUPS_RESULT: ${{ needs.backups.result }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = workflow_run ]; then
            if [ "$MONITOR_RESULT" = success ] && [ "$BACKUPS_RESULT" = success ]; then STATE=success; else STATE=failure; fi
          else
            is_ok() { [ "$1" = success ] || [ "$1" = skipped ]; }
            if is_ok "$MONITOR_RESULT" && is_ok "$BACKUPS_RESULT"; then STATE=success; else STATE=failure; fi
          fi
          if [ "$STATE" = success ]; then DESCRIPTION="Production monitoring and PostgreSQL backups verified"; else DESCRIPTION="Production operations check failed"; fi
          export STATE DESCRIPTION
          node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,context:"Production Operations",description:process.env.DESCRIPTION,target_url:process.env.TARGET_URL}))' > /tmp/operations-status.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${SOURCE_SHA}" \
            --data-binary @/tmp/operations-status.json
          test "$STATE" = success
