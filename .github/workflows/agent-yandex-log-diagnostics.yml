name: Agent Yandex Runtime Log Diagnostics

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: read

jobs:
  diagnostics:
    if: github.head_ref == 'agent/restore-password-registration-fix-fetch-quest'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -a
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"
      - name: Configure Yandex Cloud CLI
        env:
          YC_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.YC_SERVICE_ACCOUNT_KEY_JSON }}
          YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
        run: |
          printf '%s' "$YC_SERVICE_ACCOUNT_KEY_JSON" > yc-sa-key.json
          yc config profile create annword-log-diagnostics
          yc config set service-account-key yc-sa-key.json
          yc config set cloud-id "$YC_CLOUD_ID"
          yc config set folder-id "$YC_FOLDER_ID"
      - name: Read three days of container logs
        env:
          YC_SERVERLESS_CONTAINER_ID: ${{ secrets.YC_SERVERLESS_CONTAINER_ID }}
        run: |
          set -o pipefail
          yc logging read \
            --resource-ids="$YC_SERVERLESS_CONTAINER_ID" \
            --since='72h ago' \
            --limit=10000 \
            --max-response-size=20M \
            --format=json > yandex-runtime-logs.json
          wc -c yandex-runtime-logs.json
      - name: Summarize network and backend failures
        run: |
          python3 - <<'PY'
          import json, re
          from collections import Counter
          from pathlib import Path

          path = Path('yandex-runtime-logs.json')
          data = json.loads(path.read_text() or '[]')
          rows = data if isinstance(data, list) else data.get('entries', []) if isinstance(data, dict) else []
          patterns = {
              'failed_fetch_related': re.compile(r'failed to fetch|networkerror|load failed|fetch failed', re.I),
              'timeout': re.compile(r'timeout|timed out|deadline|504|gateway timeout', re.I),
              'connection': re.compile(r'econnreset|econnrefused|socket hang up|connection reset|broken pipe', re.I),
              'cors': re.compile(r'cors|origin|access-control-allow-origin', re.I),
              'database': re.compile(r'postgres|database|connection terminated|too many clients|pool|query failed', re.I),
              'server_error': re.compile(r'\b5\d\d\b|fatal|uncaught|unhandled|internal server error', re.I),
          }
          counts = Counter()
          status_counts = Counter()
          path_counts = Counter()
          samples = {key: [] for key in patterns}
          for row in rows:
              text = json.dumps(row, ensure_ascii=False, default=str)
              for status in re.findall(r'(?<!\d)([1-5]\d\d)(?!\d)', text):
                  status_counts[status] += 1
              for route in re.findall(r'/(?:api/)?[A-Za-z0-9_./-]+', text):
                  if len(route) < 120:
                      path_counts[route] += 1
              for key, pattern in patterns.items():
                  if pattern.search(text):
                      counts[key] += 1
                      if len(samples[key]) < 20:
                          samples[key].append(row)
          summary = {
              'entries': len(rows),
              'pattern_counts': dict(counts),
              'status_counts': status_counts.most_common(30),
              'path_counts': path_counts.most_common(50),
              'samples': samples,
          }
          Path('yandex-runtime-summary.json').write_text(json.dumps(summary, ensure_ascii=False, indent=2, default=str))
          print(json.dumps({k: v for k, v in summary.items() if k != 'samples'}, ensure_ascii=False, indent=2))
          PY
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: yandex-runtime-log-diagnostics
          path: |
            yandex-runtime-logs.json
            yandex-runtime-summary.json
          retention-days: 3
