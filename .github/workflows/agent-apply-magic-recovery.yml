name: Apply magic recovery patch

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
  push:
    branches:
      - agent/magic-link-recovery-stable-notices
    paths:
      - .agent-apply-magic-recovery

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'pull_request' || github.event.head_commit.message == 'Trigger agent magic recovery patch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/magic-link-recovery-stable-notices
          fetch-depth: 0
      - name: Apply source patches
        run: |
          set -o pipefail
          python3 scripts/agent_apply_magic_recovery.py 2>&1 | tee /tmp/agent-magic-patch.log
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-magic-patch-log
          path: /tmp/agent-magic-patch.log
          if-no-files-found: warn
          retention-days: 1
      - name: Commit patched sources
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .agent-apply-magic-recovery .github/workflows/agent-apply-magic-recovery.yml scripts/agent_apply_magic_recovery.py
          git add .
          git commit -m "Require magic-link confirmation and add account recovery"
          git push origin HEAD:agent/magic-link-recovery-stable-notices
