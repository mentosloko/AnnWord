name: Bootstrap AnnWord Postbox

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: bootstrap-annword-postbox
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Verify annword.ru for Yandex Postbox
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Mark Postbox bootstrap pending
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node -e 'process.stdout.write(JSON.stringify({state:"pending",context:"Yandex Postbox Bootstrap",description:"Creating and verifying annword.ru sender",target_url:process.env.TARGET_URL}))' > /tmp/postbox-status.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/postbox-status.json

      - name: Install Yandex Cloud CLI
        run: |
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -a
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Configure Yandex Cloud CLI
        env:
          YC_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.YC_SERVICE_ACCOUNT_KEY_JSON }}
          YC_CLOUD_ID: ${{ secrets.YC_CLOUD_ID }}
          YC_FOLDER_ID: ${{ secrets.YC_FOLDER_ID }}
        run: |
          set -euo pipefail
          printf '%s' "$YC_SERVICE_ACCOUNT_KEY_JSON" > /tmp/yc-sa-key.json
          yc config profile create annword-postbox-bootstrap
          yc config set service-account-key /tmp/yc-sa-key.json
          yc config set cloud-id "$YC_CLOUD_ID"
          yc config set folder-id "$YC_FOLDER_ID"

      - name: Locate public annword.ru DNS zone
        run: |
          set -euo pipefail
          yc dns zone list --format json > /tmp/dns-zones.json
          node - <<'NODE'
          const fs = require('fs');
          const zones = JSON.parse(fs.readFileSync('/tmp/dns-zones.json', 'utf8'));
          const zone = zones.find(item => String(item.zone || '').replace(/\.$/, '').toLowerCase() === 'annword.ru');
          if (!zone?.id) {
            throw new Error('Public DNS zone annword.ru is not managed in this Yandex Cloud folder. DKIM cannot be installed automatically.');
          }
          fs.writeFileSync('/tmp/dns-zone-id', zone.id);
          console.log('Found managed annword.ru DNS zone.');
          NODE

      - name: Recreate annword.ru Postbox identity with BYODKIM
        id: identity
        env:
          POSTBOX_IDENTITY: annword.ru
        run: |
          set -euo pipefail
          IAM_TOKEN="$(yc iam create-token)"
          IDENTITY_URL="https://postbox.cloud.yandex.net/v2/email/identities/${POSTBOX_IDENTITY}"

          HTTP_CODE="$(curl -sS -o /tmp/current-identity.json -w '%{http_code}' \
            -H "X-YaCloud-SubjectToken: $IAM_TOKEN" \
            "$IDENTITY_URL")"

          if [ "$HTTP_CODE" = "200" ]; then
            node - <<'NODE'
          const fs = require('fs');
          const x = JSON.parse(fs.readFileSync('/tmp/current-identity.json', 'utf8'));
          console.log(JSON.stringify({
            IdentityName: x.IdentityName || x.EmailIdentity || null,
            VerificationStatus: x.VerificationStatus || null,
            SendingEnabled: x.SendingEnabled ?? null,
            VerifiedForSendingStatus: x.VerifiedForSendingStatus ?? null,
            DkimStatus: x.DkimAttributes?.Status || null,
            SigningAttributesOrigin: x.DkimAttributes?.SigningAttributesOrigin || null,
          }, null, 2));
          NODE
            CURRENT_STATUS="$(node -e 'const fs=require("fs");const x=JSON.parse(fs.readFileSync("/tmp/current-identity.json","utf8"));process.stdout.write(String(x.VerificationStatus||x.DkimAttributes?.Status||""));')"
            if [ "$CURRENT_STATUS" = "SUCCESS" ]; then
              echo "annword.ru is already verified in Postbox."
              echo "already_verified=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Removing the existing unverified annword.ru identity before deterministic BYODKIM setup."
            DELETE_CODE="$(curl -sS -o /tmp/delete-identity.json -w '%{http_code}' \
              -X DELETE \
              -H "X-YaCloud-SubjectToken: $IAM_TOKEN" \
              "$IDENTITY_URL")"
            test "$DELETE_CODE" = "200" -o "$DELETE_CODE" = "204"
            sleep 5
          elif [ "$HTTP_CODE" != "404" ]; then
            echo "Unexpected Postbox identity lookup HTTP $HTTP_CODE"
            cat /tmp/current-identity.json
            exit 1
          fi

          echo "already_verified=false" >> "$GITHUB_OUTPUT"
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out /tmp/annword-dkim-private.pem 2>/dev/null
          PRIVATE_KEY_B64="$(openssl pkcs8 -topk8 -nocrypt -in /tmp/annword-dkim-private.pem -outform DER | base64 -w0)"
          PUBLIC_KEY_B64="$(openssl pkey -in /tmp/annword-dkim-private.pem -pubout -outform DER | base64 -w0)"
          printf '%s' "$PUBLIC_KEY_B64" > /tmp/annword-dkim-public-key

          PRIVATE_KEY_B64="$PRIVATE_KEY_B64" node - <<'NODE'
          const fs = require('fs');
          fs.writeFileSync('/tmp/create-identity.json', JSON.stringify({
            EmailIdentity: 'annword.ru',
            DkimSigningAttributes: {
              DomainSigningSelector: 'annword',
              DomainSigningPrivateKey: process.env.PRIVATE_KEY_B64,
            },
          }));
          NODE

          CREATE_CODE="$(curl -sS -o /tmp/create-identity-response.json -w '%{http_code}' \
            -X POST \
            -H "X-YaCloud-SubjectToken: $IAM_TOKEN" \
            -H 'Content-Type: application/json' \
            --data-binary @/tmp/create-identity.json \
            'https://postbox.cloud.yandex.net/v2/email/identities')"
          if [ "$CREATE_CODE" != "200" ]; then
            echo "Postbox identity creation failed with HTTP $CREATE_CODE"
            cat /tmp/create-identity-response.json
            exit 1
          fi
          rm -f /tmp/annword-dkim-private.pem /tmp/create-identity.json
          echo "Created annword.ru Postbox identity with BYODKIM."

      - name: Install DKIM record in Yandex Cloud DNS
        if: ${{ steps.identity.outputs.already_verified != 'true' }}
        run: |
          set -euo pipefail
          ZONE_ID="$(cat /tmp/dns-zone-id)"
          PUBLIC_KEY_B64="$(cat /tmp/annword-dkim-public-key)"
          RECORD_NAME='annword._domainkey.annword.ru.'
          RECORD_VALUE="v=DKIM1;h=sha256;k=rsa;p=${PUBLIC_KEY_B64}"
          yc dns zone replace-records --id "$ZONE_ID" \
            --record "$RECORD_NAME 300 TXT \"$RECORD_VALUE\""
          yc dns zone list-records --id "$ZONE_ID" --format json > /tmp/dns-records.json
          node - <<'NODE'
          const fs = require('fs');
          const records = JSON.parse(fs.readFileSync('/tmp/dns-records.json', 'utf8'));
          const record = records.find(item => String(item.name || '').toLowerCase() === 'annword._domainkey.annword.ru.');
          if (!record) throw new Error('DKIM record was not visible in the Yandex DNS zone after write.');
          console.log(JSON.stringify({ name: record.name, type: record.type, ttl: record.ttl, dataCount: Array.isArray(record.data) ? record.data.length : 0 }));
          NODE
          echo "Installed annword.ru DKIM TXT record."

      - name: Wait for Postbox verification
        env:
          POSTBOX_IDENTITY: annword.ru
        run: |
          set -euo pipefail
          IAM_TOKEN="$(yc iam create-token)"
          IDENTITY_URL="https://postbox.cloud.yandex.net/v2/email/identities/${POSTBOX_IDENTITY}"
          for attempt in $(seq 1 60); do
            curl -fsS -H "X-YaCloud-SubjectToken: $IAM_TOKEN" "$IDENTITY_URL" -o /tmp/identity-status.json
            node - <<'NODE'
          const fs = require('fs');
          const x = JSON.parse(fs.readFileSync('/tmp/identity-status.json', 'utf8'));
          console.log(JSON.stringify({
            IdentityName: x.IdentityName || x.EmailIdentity || null,
            VerificationStatus: x.VerificationStatus || null,
            SendingEnabled: x.SendingEnabled ?? null,
            VerifiedForSendingStatus: x.VerifiedForSendingStatus ?? null,
            DkimStatus: x.DkimAttributes?.Status || null,
            SigningAttributesOrigin: x.DkimAttributes?.SigningAttributesOrigin || null,
          }));
          NODE
            STATUS="$(node -e 'const fs=require("fs");const x=JSON.parse(fs.readFileSync("/tmp/identity-status.json","utf8"));process.stdout.write(String(x.VerificationStatus||x.DkimAttributes?.Status||""));')"
            echo "Postbox verification attempt $attempt: ${STATUS:-unknown}"
            if [ "$STATUS" = "SUCCESS" ]; then
              node - <<'NODE'
              const fs = require('fs');
              const x = JSON.parse(fs.readFileSync('/tmp/identity-status.json', 'utf8'));
              fs.writeFileSync('/tmp/postbox-bootstrap-result.json', JSON.stringify({
                identity: 'annword.ru',
                verificationStatus: x.VerificationStatus || x.DkimAttributes?.Status || null,
                sendingEnabled: x.SendingEnabled ?? null,
                signingOrigin: x.DkimAttributes?.SigningAttributesOrigin || null,
                verifiedForSending: x.VerifiedForSendingStatus !== false,
              }, null, 2));
              NODE
              exit 0
            fi
            sleep 15
          done
          echo "Postbox did not verify annword.ru within 15 minutes."
          cat /tmp/identity-status.json
          exit 1

      - name: Verify live AnnWord weekly-report preflight
        env:
          YC_API_PUBLIC_URL: ${{ secrets.YC_API_PUBLIC_URL }}
        run: |
          set -euo pipefail
          API_BASE="${YC_API_PUBLIC_URL%/}"
          for attempt in $(seq 1 20); do
            HTTP_CODE="$(curl -sS -o /tmp/live-weekly-status.json -w '%{http_code}' "$API_BASE/api/reports/weekly/status")"
            cat /tmp/live-weekly-status.json
            if [ "$HTTP_CODE" = "200" ] && node -e 'const fs=require("fs");const x=JSON.parse(fs.readFileSync("/tmp/live-weekly-status.json","utf8"));process.exit(x.configured&&x.postboxIdentityVerified===true?0:1)'; then
              exit 0
            fi
            sleep 10
          done
          echo "Live AnnWord weekly-report preflight did not turn green."
          exit 1

      - name: Upload sanitized bootstrap result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: annword-postbox-bootstrap-result
          path: |
            /tmp/postbox-bootstrap-result.json
            /tmp/live-weekly-status.json
            /tmp/current-identity.json
            /tmp/identity-status.json
          if-no-files-found: ignore
          retention-days: 3

      - name: Publish Postbox bootstrap status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          TARGET_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATE="success"
            DESCRIPTION="annword.ru Postbox sender verified"
          else
            STATE="failure"
            DESCRIPTION="annword.ru Postbox bootstrap failed"
          fi
          export STATE DESCRIPTION
          node -e 'process.stdout.write(JSON.stringify({state:process.env.STATE,context:"Yandex Postbox Bootstrap",description:process.env.DESCRIPTION,target_url:process.env.TARGET_URL}))' > /tmp/postbox-status.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/postbox-status.json
