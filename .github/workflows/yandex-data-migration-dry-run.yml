name: Yandex Data Migration Dry Run

on:
  push:
    branches:
      - infra/ru-cloud-migration
    paths:
      - ".github/workflows/yandex-data-migration-dry-run.yml"
      - ".github/workflows/yandex-data-migration.yml"
      - "scripts/migrate-user-skeletons-to-yandex.ts"
      - "scripts/migrate-core-data-to-yandex.ts"
      - "scripts/yandex-db-migrate.ts"
      - "package.json"

concurrency:
  group: yandex-data-migration-dry-run
  cancel-in-progress: true

jobs:
  dry-run:
    name: Dry-run Supabase to Yandex migration
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Dry-run user skeleton migration
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANNWORD_MIGRATION_APPLY: "false"
          ANNWORD_MIGRATION_EMAIL_CONFLICT: skip
        run: npm run db:migrate:users

      - name: Dry-run core data migration
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANNWORD_MIGRATION_APPLY: "false"
          ANNWORD_MIGRATION_INCLUDE_GAME_EVENTS: "true"
          ANNWORD_MIGRATION_INCLUDE_ANALYTICS: "false"
        run: npm run db:migrate:core
