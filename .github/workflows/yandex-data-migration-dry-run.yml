name: Yandex Data Migration Dry Run

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Deploy to Yandex Cloud
    types:
      - completed
    branches:
      - infra/ru-cloud-migration

concurrency:
  group: yandex-data-migration-dry-run
  cancel-in-progress: true

jobs:
  dry-run:
    name: Dry-run Supabase to Yandex migration inside backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Call Yandex-side dry-run endpoint
        env:
          YC_API_PUBLIC_URL: ${{ secrets.YC_API_PUBLIC_URL }}
          ANNWORD_MIGRATION_SECRET: ${{ secrets.ANNWORD_MIGRATION_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${ANNWORD_MIGRATION_SECRET:-}" ]; then
            echo "ANNWORD_MIGRATION_SECRET is not configured. Skipping dry-run."
            exit 0
          fi
          API_URL="${YC_API_PUBLIC_URL%/}/api/admin/migration/supabase"
          curl --fail-with-body -sS \
            -X POST "$API_URL" \
            -H "Content-Type: application/json" \
            -H "X-AnnWord-Migration-Secret: $ANNWORD_MIGRATION_SECRET" \
            --data '{"apply":false,"includeGameEvents":true,"includeAnalytics":false}'
