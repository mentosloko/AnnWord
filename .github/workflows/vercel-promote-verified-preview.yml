name: Promote Verified Vercel Preview

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/vercel-promote-verified-preview.yml'
  workflow_dispatch:
    inputs:
      deployment_id:
        description: READY Vercel deployment ID to promote
        required: true
        default: dpl_6hB8EJyZpK7kk3sF54gYK3BKxcSs
      expected_entry_asset:
        description: Expected entry asset in promoted HTML
        required: true
        default: index-Brr2DLwE.js

permissions:
  contents: read
  statuses: write

concurrency:
  group: vercel-promote-verified-preview
  cancel-in-progress: true

jobs:
  promote:
    name: Promote verified preview without rebuild
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERCEL_PROJECT_ID: prj_FXkostulT2hFcfu2Y4ffPFXHJ96q
      VERCEL_TEAM_ID: team_f6p6zecR5jGHCXTV1kZVSIux
      DEPLOYMENT_ID: ${{ inputs.deployment_id || 'dpl_6hB8EJyZpK7kk3sF54gYK3BKxcSs' }}
      EXPECTED_ENTRY_ASSET: ${{ inputs.expected_entry_asset || 'index-Brr2DLwE.js' }}
      APP_BASE: https://ann-word.vercel.app
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Validate Vercel promotion credentials
        run: |
          set -euo pipefail
          if [ -z "$VERCEL_TOKEN" ]; then
            echo 'Repository secret VERCEL_TOKEN is not configured.'
            exit 1
          fi

      - name: Promote the verified READY deployment
        run: |
          set -euo pipefail
          response_code="$(curl --silent --show-error \
            --output /tmp/vercel-promote.json \
            --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/promote/$DEPLOYMENT_ID?teamId=$VERCEL_TEAM_ID")"
          cat /tmp/vercel-promote.json || true
          if [ "$response_code" != '201' ] && [ "$response_code" != '202' ]; then
            echo "Vercel promotion failed with HTTP $response_code"
            exit 1
          fi

      - name: Verify production alias points to the verified artifact
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            code="$(curl --silent --show-error --location \
              --connect-timeout 15 --max-time 45 \
              --output /tmp/vercel-index.html \
              --write-out '%{http_code}' \
              "$APP_BASE/?promotion=$GITHUB_RUN_ID-$attempt" || true)"
            if [ "$code" = '200' ] \
              && grep -Fq "$EXPECTED_ENTRY_ASSET" /tmp/vercel-index.html \
              && ! grep -Eq 'modulepreload[^>]+dictionary-(general|premium)' /tmp/vercel-index.html; then
              echo "Verified Vercel production artifact $DEPLOYMENT_ID."
              exit 0
            fi
            echo "Attempt $attempt: HTTP=$code; expected=$EXPECTED_ENTRY_ASSET"
            sleep 10
          done
          cat /tmp/vercel-index.html || true
          exit 1

      - name: Publish green Vercel status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          node -e 'process.stdout.write(JSON.stringify({state:"success",context:"Vercel",description:"Verified READY preview promoted to Vercel production without rebuild",target_url:process.env.APP_BASE}))' > /tmp/vercel-status.json
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/vercel-status.json
