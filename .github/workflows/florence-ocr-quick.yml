name: Florence OCR quick benchmark

on:
  push:
    branches:
      - test/easyocr-evaluation-20260718
    paths:
      - .github/workflows/florence-ocr-quick.yml
      - scripts/florence_ocr_quick.py
      - testdata/easyocr/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/florence-ocr-quick.yml
      - scripts/florence_ocr_quick.py
      - testdata/easyocr/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HF_HUB_DISABLE_XET: '1'
      TOKENIZERS_PARALLELISM: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install CPU dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
          python -m pip install 'transformers>=5.13,<5.15' pillow safetensors timm einops sentencepiece
      - name: Run Florence benchmark
        run: python scripts/florence_ocr_quick.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: florence-ocr-result
          path: florence-ocr-result/
          retention-days: 7
