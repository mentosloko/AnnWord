name: Apply Mobile Game Fixes

on:
  push:
    branches:
      - agent/fix-mobile-game-layout-streak-choice
    paths:
      - '.github/workflows/apply-mobile-game-fixes.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-mobile-game-layout-streak-choice
          fetch-depth: 0

      - name: Apply guarded product patch
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one match, found {count}: {old[:100]!r}')
              file.write_text(text.replace(old, new, 1))

          # Classic: remove the in-game dictionary and size the board from its actual container.
          replace_once('components/screens/ClassicGameScreen.tsx', "import { DictionaryPeek } from '../DictionaryPeek';\n", '')
          replace_once(
              'components/screens/ClassicGameScreen.tsx',
              "export const ClassicGameScreen: React.FC<Props> = ({ gameState, settings, userProfile, isAuthenticated, rulesViewerKey = 'guest', keyStatuses, shakeRowIndex, dictionaryWords = [], dictionaryLabel = 'Мой словарь', dictionaryIcon = '📖', onChar, onDelete, onEnter, onHint, onRestart, onBackHome, onRegister, onDictionaryPeek }) => {",
              "export const ClassicGameScreen: React.FC<Props> = ({ gameState, settings, userProfile, isAuthenticated, rulesViewerKey = 'guest', keyStatuses, shakeRowIndex, onChar, onDelete, onEnter, onHint, onRestart, onBackHome, onRegister }) => {",
          )
          replace_once(
              'components/screens/ClassicGameScreen.tsx',
              '<ScreenContainer compact className="h-[100svh] max-w-none overflow-hidden px-1.5 py-1.5 sm:px-3 sm:py-2 lg:px-5">',
              '<ScreenContainer compact className="h-[100dvh] min-h-[100svh] max-w-none overflow-hidden px-1.5 py-1.5 sm:px-3 sm:py-2 lg:px-5">',
          )
          replace_once(
              'components/screens/ClassicGameScreen.tsx',
              'grid-rows-[auto_auto_minmax(0,1fr)_auto]',
              'grid-rows-[auto_minmax(1.25rem,auto)_minmax(0,1fr)_auto]',
          )
          replace_once(
              'components/screens/ClassicGameScreen.tsx',
              "          <div className=\"flex items-center gap-1\">\n            <DictionaryPeek words={dictionaryWords} wordLength={activeWordLength} iconOnly locked={!authenticated} lockedMessage=\"Словарь доступен после регистрации в Kids или Practice.\" label={dictionaryLabel} icon={dictionaryIcon} onBeforeOpen={showKidsRewards ? onDictionaryPeek : undefined} chargeLabel=\"Просмотр словаря стоит как подсказка.\" />\n            <button type=\"button\" aria-label=\"Показать правила\"",
              "          <div className=\"flex items-center gap-1\">\n            <button type=\"button\" aria-label=\"Показать правила\"",
          )

          replace_once(
              'components/Grid.tsx',
              "const getCellSize = (wordLength: WordLength): string => {\n  const horizontalGap = wordLength === 6 ? '0.28rem' : '0.34rem';\n  const maxSize = wordLength === 6 ? '4.45rem' : '4.85rem';\n  // ClassicGameScreen is constrained by 100svh. Using 100dvh here made the\n  // cells calculate against a taller viewport while browser chrome was visible,\n  // so the six rows overflowed their actual parent on mobile browsers.\n  return `min(calc((100vw - 1.1rem - (${wordLength - 1} * ${horizontalGap})) / ${wordLength}), calc((100svh - 10.25rem) / 6), ${maxSize})`;\n};",
              "const getCellSize = (wordLength: WordLength): string => {\n  const horizontalGap = wordLength === 6 ? '0.28rem' : '0.34rem';\n  const maxSize = wordLength === 6 ? '4.45rem' : '4.85rem';\n  // The grid is a size container. cqw/cqh use the space that actually remains\n  // between the Classic header, status row and keyboard, including mobile chrome.\n  return `min(calc((100cqw - 0.75rem - (${wordLength - 1} * ${horizontalGap})) / ${wordLength}), calc((100cqh - 1.65rem) / 6), ${maxSize})`;\n};",
          )
          replace_once(
              'components/Grid.tsx',
              '<div role="grid" aria-label="Поле игры Классика" className="flex h-full min-h-0 w-full max-w-[min(42rem,100vw)] flex-col items-center justify-center gap-[min(0.5svh,0.32rem)] p-0.5">',
              '<div role="grid" aria-label="Поле игры Классика" className="flex h-full min-h-0 w-full max-w-[42rem] flex-col items-center justify-center gap-[min(0.5cqh,0.32rem)] p-0.5" style={{ containerType: \'size\' }}>',
          )

          # Shared shell: one dynamic viewport model and a scrollable center for every mode.
          replace_once(
              'components/screens/GameModeShell.tsx',
              '<ScreenContainer compact className="h-[100svh] max-w-none overflow-hidden px-2 py-2 sm:px-4 sm:py-4 lg:px-6">',
              '<ScreenContainer compact className="h-[100dvh] min-h-[100svh] max-w-none overflow-hidden px-2 py-2 pb-[max(0.5rem,env(safe-area-inset-bottom))] sm:px-4 sm:py-4 lg:px-6">',
          )
          replace_once(
              'components/screens/GameModeShell.tsx',
              '<div className="mx-auto flex h-full min-h-0 w-full max-w-[88rem] flex-col gap-2 sm:gap-3 lg:gap-4">',
              '<div className="mx-auto flex h-full min-h-0 w-full max-w-[88rem] flex-col gap-[clamp(0.4rem,1dvh,0.9rem)]">',
          )
          replace_once(
              'components/screens/GameModeShell.tsx',
              '<section className="flex min-h-0 flex-1 items-start justify-center overflow-hidden rounded-[1.5rem] border-2 border-indigo-50 bg-white/80 p-1.5 shadow-sm sm:rounded-[2rem] sm:p-5 lg:flex-none lg:items-center lg:rounded-[2.5rem] lg:p-6">\n          <div className="flex h-full min-h-0 w-full justify-center overflow-hidden">{child}</div>',
              '<section className="flex min-h-0 flex-1 items-start justify-center overflow-hidden rounded-[1.5rem] border-2 border-indigo-50 bg-white/80 p-1.5 shadow-sm sm:items-center sm:rounded-[2rem] sm:p-4 lg:rounded-[2.5rem] lg:p-6">\n          <div className="flex h-full min-h-0 w-full justify-center overflow-y-auto overscroll-contain pb-[max(0.25rem,env(safe-area-inset-bottom))]">{child}</div>',
          )
          replace_once(
              'components/screens/GameModeShell.tsx',
              'className="w-full max-w-md rounded-[2rem] border-2 border-indigo-100 bg-white p-5 shadow-2xl sm:p-6"',
              'className="max-h-[calc(100dvh-1.5rem)] w-full max-w-md overflow-y-auto overscroll-contain rounded-[2rem] border-2 border-indigo-100 bg-white p-5 shadow-2xl sm:p-6"',
          )

          # 1 of 2: explicit continuation after every answer and no duplicate correct-word copy.
          replace_once(
              'components/TranslationChoiceGame.tsx',
              "  const timersRef = useRef<Array<ReturnType<typeof window.setTimeout>>>([]);\n",
              '',
          )
          replace_once(
              'components/TranslationChoiceGame.tsx',
              "  const clearTimers = useCallback(() => {\n    timersRef.current.forEach(id => window.clearTimeout(id));\n    timersRef.current = [];\n  }, []);\n  const schedule = useCallback((action: () => void, delay: number) => {\n    const id = window.setTimeout(() => {\n      timersRef.current = timersRef.current.filter(timer => timer !== id);\n      action();\n    }, delay);\n    timersRef.current.push(id);\n  }, []);\n  useEffect(() => clearTimers, [clearTimers]);\n\n  const finish = () => { clearTimers(); setFinished(true); };",
              "  const finish = () => setFinished(true);",
          )
          replace_once(
              'components/TranslationChoiceGame.tsx',
              "  const goNextAfterWrong = () => {\n    if (!question) return;\n    if (answered >= 10) finish(); else next(question.correct);\n  };",
              "  const continueAfterAnswer = () => {\n    if (!question || !feedback) return;\n    if (answered >= 10) finish(); else next(question.correct);\n  };",
          )
          replace_once(
              'components/TranslationChoiceGame.tsx',
              "    if (correct) schedule(() => { if (nextAnswered >= 10) finish(); else next(question.correct); }, 650);\n",
              '',
          )
          replace_once('components/TranslationChoiceGame.tsx', '    clearTimers();\n    rewardAppliedRef.current = false;', '    rewardAppliedRef.current = false;')
          replace_once('components/TranslationChoiceGame.tsx', "  const leave = () => { clearTimers(); onBack(); };", '  const leave = () => onBack();')
          replace_once(
              'components/TranslationChoiceGame.tsx',
              '  return <div className="mx-auto flex w-full max-w-xl flex-col rounded-3xl bg-white p-4 shadow-xl sm:p-6">',
              '  return <div className="mx-auto flex h-full min-h-0 w-full max-w-xl flex-col overflow-y-auto overscroll-contain rounded-3xl bg-white p-4 pb-[max(1rem,env(safe-area-inset-bottom))] shadow-xl sm:h-auto sm:p-6">',
          )
          replace_once(
              'components/TranslationChoiceGame.tsx',
              '    {feedback && <div aria-live="polite" className={`mt-4 rounded-2xl px-4 py-3 text-center text-sm font-black ${feedback === \'correct\' ? \'bg-green-50 text-green-700\' : \'bg-rose-50 text-rose-700\'}`}>{feedback === \'correct\' ? \'Верно!\' : `Нужно: ${question.correct}`}</div>}\n    {feedback === \'wrong\' && <button type="button" onClick={goNextAfterWrong} className="mt-3 w-full rounded-2xl bg-indigo-600 px-5 py-3 font-black text-white">{answered >= 10 ? \'Завершить раунд\' : \'Следующее слово\'}</button>}',
              '    {feedback && <div className="sr-only" role="status" aria-live="polite">{feedback === \'correct\' ? \'Ответ верный.\' : \'Ответ неверный. Правильный вариант выделен зелёным.\'}</div>}\n    {feedback && <button type="button" onClick={continueAfterAnswer} className="mt-4 w-full rounded-2xl bg-indigo-600 px-5 py-3 font-black text-white">{answered >= 10 ? \'Завершить раунд\' : \'Продолжить\'}</button>}',
          )

          # First daily completion must immediately be streak day one, server-authoritative.
          replace_once('server/dailyQuestRepository.ts', 'import { getProfileById } from "./profileRepository";\n', 'import { reconcileProfileMood } from "./petMoodRepository";\n')
          replace_once('server/dailyQuestRepository.ts', 'if (quest.completed) return { quest, reward: null, profile: await getProfileById(userId) };', 'if (quest.completed) return { quest, reward: null, profile: await reconcileProfileMood(userId, true) };')
          replace_once('server/dailyQuestRepository.ts', '    profile: await getProfileById(userId),', '    profile: await reconcileProfileMood(userId, true),')
          replace_once(
              'components/screens/PracticeHomeScreenWithLetterSquare.tsx',
              "  const daysInRow = userProfile.pet.dailyStreak || 0;\n  const questCompleted = dailyQuest?.completed === true;",
              "  const questCompleted = dailyQuest?.completed === true;\n  const storedStreak = Math.max(0, Math.round(userProfile.pet.dailyStreak || 0));\n  const daysInRow = questCompleted ? Math.max(1, storedStreak) : storedStreak;",
          )
          replace_once(
              'components/screens/KidsHomeScreen.tsx',
              '  const streakDays = Math.max(0, Math.round(userProfile.pet.dailyStreak || 0));',
              '  const storedStreakDays = Math.max(0, Math.round(userProfile.pet.dailyStreak || 0));\n  const streakDays = dailyQuest?.completed ? Math.max(1, storedStreakDays) : storedStreakDays;',
          )
          replace_once(
              'components/AppScreens.tsx',
              '  const rewardStreakDays = Math.max(0, Math.round(userProfile.pet.dailyStreak || 0));',
              '  const storedRewardStreakDays = Math.max(0, Math.round(userProfile.pet.dailyStreak || 0));\n  const rewardStreakDays = dailyQuest?.completed ? Math.max(1, storedRewardStreakDays) : storedRewardStreakDays;',
          )

          # Remove nested viewport assumptions from Snake and keep all result dialogs usable on short screens.
          replace_once(
              'components/LetterSquareGameV3.tsx',
              'return <div className="mx-auto flex h-[calc(100svh-1rem)] w-full max-w-md flex-col overflow-hidden rounded-3xl bg-white p-2 shadow-xl sm:h-auto sm:min-h-0 sm:p-4">',
              'return <div className="mx-auto flex h-full min-h-0 w-full max-w-md flex-col overflow-y-auto overscroll-contain rounded-3xl bg-white p-2 pb-[max(0.5rem,env(safe-area-inset-bottom))] shadow-xl sm:h-auto sm:p-4">',
          )
          replace_once(
              'components/LetterSquareGameV3.tsx',
              'w-[min(100%,18.25rem,calc(100svh-18rem))]',
              'w-[min(100%,18.25rem)]',
          )
          replace_once(
              'components/GameResultOverlay.tsx',
              'className="w-full max-w-md rounded-[2rem] border-2 border-indigo-100 bg-white p-5 text-center shadow-2xl sm:p-6"',
              'className="max-h-[calc(100dvh-2rem)] w-full max-w-md overflow-y-auto overscroll-contain rounded-[2rem] border-2 border-indigo-100 bg-white p-5 text-center shadow-2xl sm:p-6"',
          )

          # Never make a false assertion while a lazy in-game word list is unavailable.
          replace_once(
              'components/DictionaryPeek.tsx',
              "            {emptyLabel || (wordLength ? `В словаре «${label}» нет слов из ${wordLength} букв.` : `Словарь «${label}» пока пуст.`)}",
              "            {emptyLabel || 'Список слов для просмотра сейчас недоступен.'}",
          )

          # Update existing viewport regression and add coverage for all reported screenshots.
          replace_once(
              'tests/mobilePracticeRootCauseRegression.test.ts',
              "  it('uses one mobile viewport model for Classic instead of mixing dvh and svh', () => {\n    const grid = read('components/Grid.tsx');\n    const screen = read('components/screens/ClassicGameScreen.tsx');\n    expect(screen).toContain('h-[100svh]');\n    expect(grid).toContain('calc((100svh - 10.25rem) / 6)');\n    expect(grid).not.toContain('calc((100dvh - 10.25rem) / 6)');\n    expect(grid).toContain('six rows overflowed their actual parent');\n  });",
              "  it('sizes Classic from the visible viewport and the actual remaining board container', () => {\n    const grid = read('components/Grid.tsx');\n    const screen = read('components/screens/ClassicGameScreen.tsx');\n    expect(screen).toContain('h-[100dvh] min-h-[100svh]');\n    expect(grid).toContain('100cqh');\n    expect(grid).toContain(\"containerType: 'size'\");\n    expect(grid).not.toContain('calc((100svh - 10.25rem) / 6)');\n  });",
          )

          Path('tests/reportedGameUiRegression.test.ts').write_text("""import { readFileSync } from 'node:fs';
          import { describe, expect, it } from 'vitest';

          const read = (path: string) => readFileSync(path, 'utf8');

          describe('reported game UI regressions', () => {
            it('does not expose the paid dictionary inside Classic or claim that loaded words are absent', () => {
              const classic = read('components/screens/ClassicGameScreen.tsx');
              const peek = read('components/DictionaryPeek.tsx');
              expect(classic).not.toContain('<DictionaryPeek');
              expect(classic).not.toContain("import { DictionaryPeek }");
              expect(peek).not.toContain('нет слов из ${wordLength} букв');
            });

            it('uses one adaptive shell for all non-Classic game modes', () => {
              const shell = read('components/screens/GameModeShell.tsx');
              const snake = read('components/LetterSquareGameV3.tsx');
              expect(shell).toContain('h-[100dvh] min-h-[100svh]');
              expect(shell).toContain('overflow-y-auto overscroll-contain');
              expect(shell).not.toContain('lg:flex-none');
              expect(snake).not.toContain('h-[calc(100svh-1rem)]');
            });

            it('shows an explicit continue action in 1 of 2 without duplicate answer copy', () => {
              const choice = read('components/TranslationChoiceGame.tsx');
              expect(choice).toContain("'Продолжить'");
              expect(choice).toContain('continueAfterAnswer');
              expect(choice).not.toContain('`Нужно: ${question.correct}`');
              expect(choice).not.toContain('goNextAfterWrong');
            });

            it('marks daily activity while completing the quest and displays day one defensively', () => {
              const repository = read('server/dailyQuestRepository.ts');
              const practice = read('components/screens/PracticeHomeScreenWithLetterSquare.tsx');
              expect(repository).toContain('reconcileProfileMood(userId, true)');
              expect(practice).toContain('questCompleted ? Math.max(1, storedStreak)');
            });

            it('keeps result dialogs scrollable on short mobile screens', () => {
              const result = read('components/GameResultOverlay.tsx');
              expect(result).toContain('max-h-[calc(100dvh-2rem)]');
              expect(result).toContain('overflow-y-auto');
            });
          });
          """.replace(/^          /gm, ''))
          PY

      - name: Commit product changes and remove patch workflow
        run: |
          git config user.name 'mentosloko'
          git config user.email 'mentosloko@gmail.com'
          git rm .github/workflows/apply-mobile-game-fixes.yml
          git add AppV2.tsx components server tests
          git commit -m 'Fix responsive game layouts and daily streak flow'
          git push origin HEAD:agent/fix-mobile-game-layout-streak-choice
